services:

  homepage:
    image: ${HOMEPAGE_IMAGE:-ghcr.io/gethomepage/homepage:v1.5}
    container_name: homepage
    restart: unless-stopped
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=hub.${MVR_AC:-mvr.ac}
      - PUID=1000
      - PGID=1000
    volumes:
      - ${HUB_CONFIG_VOLUME:-./config}:/app/config
    networks:
      - seafile-net
    labels:
      caddy_0: https://hub.${MVR_AC:-mvr.ac}
      caddy_0.reverse_proxy: "{{upstreams 3000}}"
      caddy_1: https://term.${MVR_AC:-mvr.ac}
      caddy_1.0_@notTailnet: not remote_ip 100.64.0.0/10
      caddy_1.1_handle: "@notTailnet"
      caddy_1.1_handle.respond: "403"
      caddy_1.2_handle.forward_auth: "authelia:9091"
      caddy_1.2_handle.forward_auth.uri: "/api/authz/forward-auth"
      caddy_1.2_handle.forward_auth.copy_headers: "Remote-User Remote-Groups Remote-Name Remote-Email"
      caddy_1.2_handle.reverse_proxy: "host.docker.internal:7681"
      caddy_1.2_handle.reverse_proxy.transport: http
      caddy_1.2_handle.reverse_proxy.transport.versions: "1.1"
      caddy_2: https://slither.${MVR_AC:-mvr.ac}
      caddy_2.0_@denied: "not path / /simulator.html /favicon.ico /static/* /exported_agents/* /api/*"
      caddy_2.1_respond: "@denied 403"
      caddy_2.2_reverse_proxy: "host.docker.internal:8088"
      caddy_3: https://grafana.${MVR_AC:-mvr.ac}
      caddy_3.0_forward_auth: "authelia:9091"
      caddy_3.0_forward_auth.uri: "/api/authz/forward-auth"
      caddy_3.0_forward_auth.copy_headers: "Remote-User Remote-Groups Remote-Name Remote-Email"
      caddy_3.1_reverse_proxy: "host.docker.internal:3000"
      # duckdns → mvr.ac redirect fan-out (302, path-preserving)
      caddy_4: https://${SEAFILE_SERVER_HOSTNAME:-mvrozanti.duckdns.org}
      caddy_4.redir: "https://${MVR_AC:-mvr.ac}{uri} 302"
      caddy_5: https://hub.${SEAFILE_SERVER_HOSTNAME:-mvrozanti.duckdns.org}
      caddy_5.redir: "https://hub.${MVR_AC:-mvr.ac}{uri} 302"
      caddy_6: https://gh.${SEAFILE_SERVER_HOSTNAME:-mvrozanti.duckdns.org}
      caddy_6.redir: "https://${MVR_AC:-mvr.ac}{uri} 302"
      caddy_7: https://seafile.${SEAFILE_SERVER_HOSTNAME:-mvrozanti.duckdns.org}
      caddy_7.redir: "https://seafile.${MVR_AC:-mvr.ac}{uri} 302"
      caddy_8: https://term.${SEAFILE_SERVER_HOSTNAME:-mvrozanti.duckdns.org}
      caddy_8.redir: "https://term.${MVR_AC:-mvr.ac}{uri} 302"
      caddy_9: https://slither.${SEAFILE_SERVER_HOSTNAME:-mvrozanti.duckdns.org}
      caddy_9.redir: "https://slither.${MVR_AC:-mvr.ac}{uri} 302"
      caddy_10: https://grafana.${SEAFILE_SERVER_HOSTNAME:-mvrozanti.duckdns.org}
      caddy_10.redir: "https://grafana.${MVR_AC:-mvr.ac}{uri} 302"
      caddy_11: https://paste.${SEAFILE_SERVER_HOSTNAME:-mvrozanti.duckdns.org}
      caddy_11.redir: "https://paste.${MVR_AC:-mvr.ac}{uri} 302"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/healthcheck || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  seafile-net:
    external: true
