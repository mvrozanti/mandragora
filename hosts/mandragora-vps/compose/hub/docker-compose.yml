services:

  homepage:
    image: ${HOMEPAGE_IMAGE:-ghcr.io/gethomepage/homepage:v1.5}
    container_name: homepage
    restart: unless-stopped
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=${HUB_HOSTNAME:-hub.mvrozanti.duckdns.org},hub.${MVR_AC:-mvr.ac}
      - PUID=1000
      - PGID=1000
    volumes:
      - ${HUB_CONFIG_VOLUME:-./config}:/app/config
    networks:
      - seafile-net
    labels:
      caddy_0: https://${HUB_HOSTNAME:-hub.mvrozanti.duckdns.org}, https://hub.${MVR_AC:-mvr.ac}
      caddy_0.reverse_proxy: "{{upstreams 3000}}"
      caddy_1: https://${SEAFILE_SERVER_HOSTNAME:-mvrozanti.duckdns.org}
      caddy_1.redir: "https://${HUB_HOSTNAME:-hub.mvrozanti.duckdns.org}{uri} 302"
      caddy_2: https://gh.${SEAFILE_SERVER_HOSTNAME:-mvrozanti.duckdns.org}
      caddy_2.redir: "https://mvrozanti.github.io{uri} 302"
      caddy_3: https://term.${SEAFILE_SERVER_HOSTNAME:-mvrozanti.duckdns.org}, https://term.${MVR_AC:-mvr.ac}
      caddy_3.0_@notTailnet: not remote_ip 100.64.0.0/10
      caddy_3.1_respond: "@notTailnet 403"
      caddy_3.2_reverse_proxy: "host.docker.internal:7681"
      caddy_3.2_reverse_proxy.transport: http
      caddy_3.2_reverse_proxy.transport.versions: "1.1"
      caddy_4: https://slither.${SEAFILE_SERVER_HOSTNAME:-mvrozanti.duckdns.org}, https://slither.${MVR_AC:-mvr.ac}
      caddy_4.0_@denied: "not path / /simulator.html /favicon.ico /static/* /exported_agents/* /api/*"
      caddy_4.1_respond: "@denied 403"
      caddy_4.2_reverse_proxy: "host.docker.internal:8088"
      caddy_5: https://grafana.${SEAFILE_SERVER_HOSTNAME:-mvrozanti.duckdns.org}, https://grafana.${MVR_AC:-mvr.ac}
      caddy_5.0_@notTailnet: not remote_ip 100.64.0.0/10
      caddy_5.1_respond: "@notTailnet 403"
      caddy_5.2_reverse_proxy: "host.docker.internal:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/healthcheck || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  seafile-net:
    external: true
