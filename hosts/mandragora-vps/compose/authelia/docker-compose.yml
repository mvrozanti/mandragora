services:

  authelia:
    image: ${AUTHELIA_IMAGE:-authelia/authelia:4.39}
    container_name: authelia
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      - TZ=${TZ:-Etc/UTC}
      - AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET=${AUTHELIA_JWT_SECRET:?Variable is not set or empty}
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET:?Variable is not set or empty}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY=${AUTHELIA_STORAGE_ENCRYPTION_KEY:?Variable is not set or empty}
    volumes:
      - ${AUTHELIA_CONFIG_VOLUME:-./config}:/config:ro
      - ${AUTHELIA_DATA_VOLUME:-./data}:/data
    networks:
      - seafile-net
    labels:
      caddy: https://auth.${MVR_AC:-mvr.ac}
      caddy.reverse_proxy: "{{upstreams 9091}}"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--no-check-certificate", "--spider", "http://localhost:9091/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: ${AUTHELIA_REDIS_IMAGE:-redis:7-alpine}
    container_name: authelia-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - ${AUTHELIA_REDIS_VOLUME:-./redis-data}:/data
    networks:
      - seafile-net

networks:
  seafile-net:
    external: true
