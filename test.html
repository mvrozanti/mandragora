<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
body { background: #0a0e17; color: #94a3b8; font-family: monospace; margin: 0; padding: 0; }
#controls { padding: 0.5rem 1rem; }
#controls button { background: #1e293b; color: #e2e8f0; border: 1px solid #475569; padding: 4px 12px; cursor: pointer; }
#controls button:hover { background: #334155; }
#stats { color: #94a3b8; font-size: 12px; padding: 0 1rem; }
.chart-container { position: relative; width: 100%; height: 70vh; }
</style>
</head>
<body>
<div id="controls">
    <button onclick="chart.resetZoom()">Reset Zoom</button>
</div>
<div id="stats"></div>
<div class="chart-container"><canvas id="c"></canvas></div>
<script>
fetch('stats_data.json')
.then(r => r.json())
.then(d => {
    // AI tool release dates
    const aiReleases = [
        { date: '2022-11-30', label: 'ChatGPT', color: '#22c55e' },
        { date: '2023-02-06', label: 'LLaMA', color: '#3b82f6' },
        { date: '2023-03-14', label: 'GPT-4', color: '#22c55e' },
        { date: '2023-06-13', label: 'Code Llama', color: '#3b82f6' },
        { date: '2023-09-27', label: 'Mixtral', color: '#f59e0b' },
        { date: '2023-11-06', label: 'DevDay', color: '#22c55e' },
        { date: '2024-02-15', label: 'Sora', color: '#22c55e' },
        { date: '2024-05-13', label: 'GPT-4o', color: '#22c55e' },
        { date: '2024-09-12', label: 'o1 Preview', color: '#22c55e' },
        { date: '2024-12-05', label: 'o3 / DeepSeek R1', color: '#ef4444' },
        { date: '2025-01-20', label: 'DeepSeek V3', color: '#ef4444' },
        { date: '2025-02-05', label: 'DeepSeek R1 (full)', color: '#ef4444' },
        { date: '2025-04-15', label: 'Claude 4', color: '#f97316' },
        { date: '2025-06-17', label: 'GPT-5 / Gemini 2.5', color: '#22c55e' },
        { date: '2026-01-15', label: 'Claude 5 / GPT-5.1', color: '#f97316' },
    ];

    // Build per-commit total changes
    let data = [];
    d.raw_commits.forEach(c => {
        c.files.forEach(f => {
            data.push({ date: c.date.slice(0,13), total: f.bytes_added + f.bytes_removed });
        });
    });

    // aggregate by hour
    let b = {};
    data.forEach(x => { if(!b[x.date]) b[x.date] = 0; b[x.date] += x.total; });
    let entries = Object.entries(b).sort((a,b2)=>a[0].localeCompare(b2[0]));

    // Convert to {x, y} with Date objects for time axis
    let points = entries.map(([dateStr, val]) => ({
        x: new Date(dateStr),
        y: val
    }));

    // Build annotations
    const annotations = {};
    aiReleases.forEach((rel, i) => {
        annotations['ai' + i] = {
            type: 'line',
            xMin: rel.date,
            xMax: rel.date,
            borderColor: rel.color,
            borderWidth: 1,
            borderDash: [6, 4],
            label: {
                display: true,
                content: rel.label,
                position: 'start',
                backgroundColor: rel.color + '22',
                color: rel.color,
                font: { size: 9 }
            }
        };
    });

    const maxVal = Math.max(...points.map(p => p.y));
    const sumVal = points.reduce((a, p) => a + p.y, 0);
    document.getElementById('stats').textContent =
        `${points.length} hourly buckets. Max: ${maxVal}, Sum: ${sumVal} bytes. Scroll=zoom, Shift+drag=select, drag=pan.`;

    window.chart = new Chart(document.getElementById('c'), {
        type: 'line',
        data: {
            datasets: [{
                label: 'Total changes',
                data: points,
                borderWidth: 1,
                fill: true,
                backgroundColor: 'rgba(56,189,248,0.15)',
                borderColor: 'rgba(56,189,248,0.8)',
                pointRadius: 0,
                tension: 0.1,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            interaction: { mode: 'nearest', axis: 'x', intersect: false },
            scales: {
                x: {
                    type: 'time',
                    time: { unit: 'month', tooltipFormat: 'yyyy-MM-dd HH:00' },
                    grid: { color: '#1e293b' },
                    ticks: { color: '#94a3b8', maxRotation: 0, autoSkip: true, maxTicksLimit: 20 }
                },
                y: {
                    type: 'logarithmic',
                    beginAtZero: true,
                    grid: { color: '#1e293b' },
                    ticks: { color: '#94a3b8' }
                }
            },
            plugins: {
                annotation: { annotations: annotations },
                zoom: {
                    pan: { enabled: true, mode: 'x' },
                    zoom: {
                        wheel: { enabled: true },
                        drag: { enabled: true },
                        mode: 'x'
                    }
                }
            }
        }
    });
})
.catch(e => document.getElementById('stats').textContent += ' ERROR: ' + e.message);
</script>
</body>
</html>
