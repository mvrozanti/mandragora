# в”Ђв”Ђ Powerline Gruvbox Theme в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Requires: Nerd Font installed (JetBrains Mono Nerd Font, FiraCode NF, etc.)

# Mode & messages
set -g mode-style "fg=#1d2021,bg=#fabd2f"
set -g message-style "fg=#fabd2f,bg=#1d2021"
set -g message-command-style "fg=#fabd2f,bg=#1d2021"

# Pane borders
set -g pane-border-style "fg=#3c3836"
set -g pane-active-border-style "fg=#b8bb26"

# Status bar
set -g status off
set -g status-position bottom
set -g status-style "bg=#1d2021,fg=#ebdbb2"
set -g status-interval 5
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 80

# Status LEFT: о‚° п‹Ђ session о‚°
set -g status-left "#[fg=#b8bb26,bold]о‚°#[fg=#1d2021,bg=#b8bb26,bold] п‹Ђ #S #[fg=#b8bb26]о‚° "

# Window tabs
setw -g window-status-format "#[fg=#665c54] о‚і#[fg=#ebdbb2,bg=#3c3836] пѓ› #I:#W "
setw -g window-status-current-format "#[fg=#fb4934,bold]о‚°#[fg=#1d2021,bg=#fb4934,bold] пѓ› #I:#W #[fg=#fb4934,bg=#1d2021,nobold]о‚°"
setw -g window-status-separator ""

# Status RIGHT: о‚І пЂ‡ hostname о‚І HH:MM
set -g status-right "#[fg=#d3869b]о‚І#[fg=#1d2021,bg=#d3869b,bold] пЂ‡ #H #[fg=#d3869b,bg=#1d2021]о‚І #[fg=#665c54]%H:%M "
