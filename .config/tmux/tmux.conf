# ── Extra Tmux Configuration ────────────────────────────────────

set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'
set -g extended-keys always

# Let kitty graphics protocol (DCS-wrapped via `\ePtmux;…\e\\`) reach the
# host terminal — required for lf image previews via `kitty +kitten icat`.
setw -g allow-passthrough on

setw -g aggressive-resize on
setw -g monitor-activity on

set-option -g set-titles on
set -g focus-events on
set-option -g set-titles-string "#T"

set -g visual-activity off
set -g visual-bell off
set -g visual-silence off

# Navigation
bind -n M-z select-pane -t :.+
bind -n C-x resize-pane -Z
bind h break-pane -d
unbind -T root C-Space
bind Space next-layout
bind l copy-mode
bind -r N previous-window
unbind d

# Track what's actually running in each pane, but use pane_title
# (which zsh keeps current via OSC 0/2 on every preexec/precmd) rather
# than just pane_current_command — so the name carries context like
# the cwd or the full command line, not just "zsh"/"ssh"/"git".
setw -g automatic-rename on
setw -g automatic-rename-format "#{pane_title}"

bind r command-prompt -I "#W" "rename-window '%%'"
bind -n -r C-q next-window
bind -n -r C-S-q previous-window
bind -n -r C-M-c new-window

# Visual window/pane pickers
bind w set-option -g @src-pane '#{pane_id}' \; choose-tree -Zw
bind W choose-tree -Zs

# Toggle window mark (highlights the slot in the statusbar)
bind -n M-m select-pane -m

# Resize panes
bind -r M-h resize-pane -L 2
bind -r M-j resize-pane -D 2
bind -r M-k resize-pane -U 2
bind -r M-l resize-pane -R 2

# Select panes (Alt-arrow without prefix, Vim-aware)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n M-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n M-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n M-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n M-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Select pane by number (Alt+Number)
bind-key -n M-1 select-pane -t 0
bind-key -n M-2 select-pane -t 1
bind-key -n M-3 select-pane -t 2
bind-key -n M-4 select-pane -t 3
bind-key -n M-5 select-pane -t 4
bind-key -n M-6 select-pane -t 5
bind-key -n M-7 select-pane -t 6
bind-key -n M-8 select-pane -t 7
bind-key -n M-9 select-pane -t 8

# Select window by position (Ctrl+Number) — positional, not index-based
bind-key -n C-1 run-shell 'tmux select-window -t $(tmux list-windows | sed -n 1p | cut -d: -f1)'
bind-key -n C-2 run-shell 'tmux select-window -t $(tmux list-windows | sed -n 2p | cut -d: -f1)'
bind-key -n C-3 run-shell 'tmux select-window -t $(tmux list-windows | sed -n 3p | cut -d: -f1)'
bind-key -n C-4 run-shell 'tmux select-window -t $(tmux list-windows | sed -n 4p | cut -d: -f1)'
bind-key -n C-5 run-shell 'tmux select-window -t $(tmux list-windows | sed -n 5p | cut -d: -f1)'
bind-key -n C-6 run-shell 'tmux select-window -t $(tmux list-windows | sed -n 6p | cut -d: -f1)'
bind-key -n C-7 run-shell 'tmux select-window -t $(tmux list-windows | sed -n 7p | cut -d: -f1)'
bind-key -n C-8 run-shell 'tmux select-window -t $(tmux list-windows | sed -n 8p | cut -d: -f1)'
bind-key -n C-9 run-shell 'tmux select-window -t $(tmux list-windows | sed -n 9p | cut -d: -f1)'

# Splits
bind \\ split-window -c "#{pane_current_path}" -h
bind - split-window -c "#{pane_current_path}" -v

# Pane join/send
bind j command-prompt -p "join pane from:" "join-pane -s '%%'"
bind o command-prompt -p "send pane to:"   "join-pane -t '%%'"

# Clipboard and Copy Mode
set -g set-clipboard on
bind -T copy-mode-vi v send-keys -X begin-selection

# ── Theme ───────────────────────────────────────────────────
# Colors follow the current pywal palette. Fallbacks are applied first in
# case pywal hasn't rendered yet, then overridden by the cached template.
set -g @wal_bg "#1d2021"
set -g @wal_fg "#ebdbb2"
set -g @wal_accent "#fabd2f"
set -g @wal_accent_fg "#1d2021"
set -g @wal_dim "#3c3836"
set -g @wal_dim_fg "#a89984"
set -g @wal_mark "#cc241d"
set -g @wal_mark_fg "#fbf1c7"
source-file -q ~/.cache/matugen/colors-tmux.conf

set -g mode-style "fg=#{@wal_accent_fg},bg=#{@wal_accent}"
set -g message-style "fg=#{@wal_accent},bg=#{@wal_bg}"
set -g pane-border-style "fg=#{@wal_dim}"
set -g pane-active-border-style "fg=#{@wal_accent}"

set -g status on
set -g status-style bg=default
set -g status-position bottom
set -g status-interval 2
set -g status-justify left
set -g status-left ""
set -g status-left-length 0
set -g status-right ""
set -g status-right-length 0

# Per-window icon selected by the pane's current command. Referenced via
# #{E:@icon} so the #{?...} expression expands lazily against each window's
# own context rather than the session's active pane.
set -g @icon "#{?#{m/r:^(nvim|vim|view|nv)$,#{pane_current_command}},,#{?#{m/r:^(git|lazygit|gitui|tig)$,#{pane_current_command}},,#{?#{m/r:^(ssh|mosh|mosh-client)$,#{pane_current_command}},,#{?#{m/r:^(btop|htop|top)$,#{pane_current_command}},,#{?#{m/r:^python[0-9.]*$,#{pane_current_command}},,#{?#{m/r:^(node|nodejs|npm|pnpm|yarn|bun)$,#{pane_current_command}},,#{?#{m/r:^lua(jit)?$,#{pane_current_command}},,#{?#{m/r:^(ncmpcpp|mpc|mpd)$,#{pane_current_command}},,#{?#{m/r:^(man|less|bat|cat)$,#{pane_current_command}},,#{?#{m/r:^(claude|gemini|opencode|codex|aider)$,#{pane_current_command}},🤖,#{?#{m/r:^(zsh|bash|fish|sh|dash)$,#{pane_current_command}},,}}}}}}}}}}}"
set -g @clean_window_name "#{s/   */ /:#{s/^ *//:#{s/ *$//:window_name}}}"

set -g window-status-separator " "
set -g window-status-activity-style "fg=#{@wal_accent},bg=default"
setw -g window-status-format "#[fg=#{?window_marked_flag,#{@wal_mark},#{@wal_dim}},bg=default]#[fg=#{?window_marked_flag,#{@wal_mark_fg},#{@wal_dim_fg}},bg=#{?window_marked_flag,#{@wal_mark},#{@wal_dim}}] #{E:@icon} #{E:@clean_window_name} #[fg=#{?window_marked_flag,#{@wal_mark},#{@wal_dim}},bg=default]"
setw -g window-status-current-format "#[fg=#{?window_marked_flag,#{@wal_mark},#{@wal_accent}},bg=default]#[fg=#{?window_marked_flag,#{@wal_mark_fg},#{@wal_accent_fg}},bg=#{?window_marked_flag,#{@wal_mark},#{@wal_accent}},bold] #{E:@icon} #{E:@clean_window_name} #[fg=#{?window_marked_flag,#{@wal_mark},#{@wal_accent}},bg=default]"

# Fix scrolling and "repetition" issues in Kitty/Alacritty
set -as terminal-overrides ',xterm-kitty:RGB'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Ensure alternate screen (like Claude) doesn't ghost on scroll
set -g alternate-screen on
