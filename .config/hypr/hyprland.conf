# ── Hyprland Configuration (0.54.3 Restored) ───────────────────

monitor = ,preferred,auto,1

env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland

input {
    kb_layout = us
    kb_variant = intl
    kb_options = caps:swapescape
    repeat_rate = 50
    repeat_delay = 300
    follow_mouse = 1
    touchpad {
        natural_scroll = no
    }
}

general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = on
        ignore_opacity = true
        xray = true
        brightness = 0.8
        contrast = 0.9
        noise = 0.01
    }
    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = yes
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

# ── Keybindings ──────────────────────────────────────────────

$mainMod = SUPER

# Core
bind = $mainMod, Q, killactive
bind = $mainMod, Return, exec, biggest-pane-placeholder # legacy bspc biggest.local
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, Delete, exit
bind = $mainMod, Tab, cyclenext
bind = $mainMod, Tab, bringactivetotop
bind = $mainMod, Space, togglefloating
bind = ALT, Tab, workspace, previous

# Apps
bind = $mainMod, 1, exec, smart-launch firefox firefox
bind = $mainMod, 2, exec, smart-launch _lf_ "kitty --class _lf_ --title _lf_ -e lf"
bind = $mainMod SHIFT, 2, exec, smart-launch nemo nemo
bind = $mainMod, 3, exec, smart-launch _zsh_ "kitty --class _zsh_ --title _zsh_"
bind = $mainMod, 4, exec, smart-launch _neomutt_ "kitty --class _neomutt_ --title _neomutt_ -e neomutt"
bind = $mainMod, 5, exec, smart-launch org.telegram.desktop telegram-desktop
bind = $mainMod, X, exec, smart-launch discord discord
bind = $mainMod, V, exec, smart-launch tradingview tradingview
bind = $mainMod SHIFT, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mainMod SHIFT, F, exec, smart-launch zapzap zapzap
bind = $mainMod, O, exec, smart-launch obsidian obsidian
bind = $mainMod SHIFT, O, exec, smart-launch libreoffice libreoffice

# Launchers
bind = $mainMod, R, exec, rofi -show run
bind = $mainMod SHIFT, D, exec, rofi-ide-picker
bind = $mainMod, P, exec, rofi-tool-picker
bind = $mainMod CTRL, D, exec, rofi-db-picker

# Window Management
bind = $mainMod, E, exec, hyprctl dispatch splitratio 0.1 # placeholder for rotation
bind = $mainMod SHIFT, E, exec, hyprctl dispatch splitratio -0.1

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 10, movetoworkspace, 10

# Media
bind = , XF86AudioNext, exec, mpc next
bind = , XF86AudioPlay, exec, mpc toggle
bind = , XF86AudioPrev, exec, mpc prev
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86AudioRaiseVolume, exec, amixer -D pulse sset Master 4%+
bind = , XF86AudioLowerVolume, exec, amixer -D pulse sset Master 4%-

# Utilities
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim - | wl-copy
bind = $mainMod, Home, exec, hyprlock
bind = $mainMod, G, exec, setbg
bind = $mainMod ALT, C, exec, cycle-audio-output
bind = $mainMod CTRL SHIFT, 1, exec, window-to-corner top-left
bind = $mainMod CTRL SHIFT, 2, exec, window-to-corner top-right
bind = $mainMod CTRL SHIFT, 3, exec, window-to-corner bottom-left
bind = $mainMod CTRL SHIFT, 4, exec, window-to-corner bottom-right

bind = $mainMod, grave, workspace, e+1
bind = $mainMod, S, pin
bind = $mainMod, C, movetoworkspacesilent, special:scratchpad
bind = $mainMod SHIFT, C, togglespecialworkspace, scratchpad
bind = $mainMod, BackSpace, exec, sleep 0.6 && hyprctl dispatch dpms off
bind = CTRL $mainMod, Pause, exec, notify-send 'Power off in 15 seconds' && sleep 15 && systemctl poweroff
bind = $mainMod, F1, exec, amixer -D pulse sset Master 4%-
bind = $mainMod, F2, exec, amixer -D pulse sset Master 4%+
bind = $mainMod, F5, exec, kitty --class rebuild -e mandragora-switch

binde = $mainMod CTRL, H, resizeactive, -30 0
binde = $mainMod CTRL, J, resizeactive, 0 30
binde = $mainMod CTRL, K, resizeactive, 0 -30
binde = $mainMod CTRL, L, resizeactive, 30 0

bind = $mainMod SHIFT, A, workspace, e-1
bind = $mainMod SHIFT, S, workspace, e+1
bind = $mainMod ALT SHIFT, A, movetoworkspace, e-1
bind = $mainMod ALT SHIFT, S, movetoworkspace, e+1

bind = $mainMod, W, exec, smart-launch ncmpcpp "kitty --class ncmpcpp -o close_on_child_death=yes -e ncmpcpp"
bind = $mainMod ALT, W, exec, kitty --class ncmpcpp-float -o close_on_child_death=yes -e ncmpcpp
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod, I, exec, smart-launch irssi "kitty --class irssi -e irssi"
bind = $mainMod ALT, P, exec, killall -SIGUSR1 waybar
bind = $mainMod ALT SHIFT, P, exec, killall -SIGUSR1 waybar
bind = $mainMod, End, exec, killall -SIGUSR1 waybar
bind = $mainMod SHIFT, 3, exec, kitty
bind = $mainMod ALT, 3, exec, kitty --class tmux-float -o font_size=10
bind = $mainMod, A, exec, rofi-db-picker
bind = $mainMod CTRL, P, exec, scrcpy
bind = CTRL $mainMod, F, exec, hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 1920 1080 && hyprctl dispatch centerwindow

bind = $mainMod, M, exec, makoctl dismiss
bind = $mainMod SHIFT, N, exec, makoctl restore
bind = $mainMod SHIFT, M, exec, makoctl dismiss --all
bind = $mainMod SHIFT, I, exec, makoctl invoke

bind = $mainMod, Scroll_Lock, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod CTRL, Scroll_Lock, exec, sleep 3 && grim -g "$(slurp)" - | wl-copy
bind = CTRL $mainMod, Print, exec, wf-recorder -g "$(slurp)" -f /tmp/recording-$(date +%s).mp4

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

