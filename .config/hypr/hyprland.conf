# ── Hyprland Configuration (0.54.3 Restored) ───────────────────

source = ~/.cache/matugen/colors-hyprland.conf

monitor = ,preferred,auto,1

env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland

exec-once = hyprctl setcursor Bibata-Modern-Classic 24
exec-once = obsidian-workspace-watcher
exec-once = eww daemon
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = ~/.config/waybar/scripts/brightness.sh restore

cursor {
    inactive_timeout = 3
    hide_on_key_press = true
}

input {
    kb_layout = us
    kb_variant = intl
    repeat_rate = 50
    repeat_delay = 300
    follow_mouse = 1
    touchpad {
        natural_scroll = no
    }
}

device {
    name = logitech-pro-gaming-keyboard
    repeat_rate = 50
    repeat_delay = 300
}

device {
    name = logitech-pro-gaming-keyboard-1
    repeat_rate = 50
    repeat_delay = 300
}

general {
    gaps_in = 5
    gaps_out = 20
    border_size = 1
    col.active_border = $color1 $color2 45deg
    col.inactive_border = $background
    layout = dwindle
}

decoration {
    rounding = 10
    active_opacity = 0.90
    inactive_opacity = 0.80
    blur {
        enabled = true
        size = 8
        passes = 3
        ignore_opacity = true
        xray = false
        brightness = 1.0
        contrast = 1.0
        noise = 0.01
        vibrancy = 0.2
        popups = true
        popups_ignorealpha = 0.2
    }
    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = yes

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = slow, 0, 0.85, 0.3, 1
    bezier = overshot, 0.7, 0.6, 0.1, 1.1
    bezier = bounce, 0.34, 1.56, 0.64, 1
    bezier = laggy, 0.5, 0, 0.5, 1

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
    animation = windowsMove, 1, 6, myBezier
    animation = layersIn, 1, 6, bounce
    animation = layersOut, 1, 4, default
}

misc {
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
}

layerrule {
    name = waybar-blur
    match:namespace = ^(waybar)$
    blur = true
    ignore_alpha = 0.0
}

layerrule {
    name = notif-blur
    match:namespace = ^(notifications)$
    blur = true
    ignore_alpha = 0.0
    animation = slide bottom
}

layerrule {
    name = eww-capture-blur
    match:namespace = ^(eww-capture)$
    blur = true
    ignore_alpha = 0.0
    animation = slide bottom
}

layerrule {
    name = eww-powermenu-blur
    match:namespace = ^(eww-powermenu)$
    blur = true
    ignore_alpha = 0.0
    animation = slide bottom
}

layerrule {
    name = rofi-blur
    match:namespace = ^(rofi)$
    blur = true
    ignore_alpha = 0.0
}


dwindle {
    pseudotile = yes
    preserve_split = yes
}

# ── Keybindings ──────────────────────────────────────────────

$mainMod = SUPER

# Core
bind = $mainMod, Q, killactive
bind = $mainMod, Return, exec, biggest-pane
bind = $mainMod SHIFT, Return, exec, biggest-pane 2
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, Delete, exit
bind = $mainMod, Tab, cyclenext
bind = $mainMod, Tab, bringactivetotop
bind = $mainMod, Space, togglefloating
bind = $mainMod SHIFT, Space, exec, pop
bind = ALT, Tab, workspace, previous

# Apps
bind = $mainMod, 1, exec, smart-launch firefox firefox
bind = $mainMod, 2, exec, smart-launch _lf_ "kitty --class _lf_ --title _lf_ -e tmux new-session -A -s lf lf"
bind = $mainMod SHIFT, 2, exec, smart-launch nemo nemo
bind = $mainMod, 3, exec, smart-launch _zsh_ "kitty --class _zsh_ --title _zsh_"
bind = $mainMod, 4, exec, smart-launch _aerc_ "[workspace 5] kitty --class _aerc_ --title _aerc_ -e tmux new-session -A -s aerc aerc"
bind = $mainMod, 5, exec, smart-launch org.telegram.desktop Telegram
bind = $mainMod, X, exec, smart-launch vesktop vesktop
bind = $mainMod, V, exec, smart-launch tradingview tradingview
bind = $mainMod, Scroll_Lock, exec, clipboard-menu
bind = $mainMod SHIFT, F, exec, smart-launch whatsapp-web "env MOZ_ENABLE_WAYLAND=1 MOZ_APP_REMOTINGNAME=whatsapp-web firefox -P whatsapp --new-instance --url https://web.whatsapp.com"
bind = $mainMod, O, exec, obsidian-launch
bind = $mainMod SHIFT, O, exec, smart-launch libreoffice libreoffice

# Launchers
bind = $mainMod, R, exec, rofi -show run
bind = $mainMod SHIFT, D, exec, rofi-ide-picker
bind = $mainMod, P, exec, smart-launch org.pwmt.zathura rofi-tool-picker
bind = $mainMod SHIFT, P, exec, rofi-tool-picker
bind = $mainMod CTRL, D, exec, rofi-db-picker
bind = $mainMod, D, exec, desktop-toggle

# Window Management
bind = $mainMod, E, exec, hyprctl dispatch layoutmsg togglesplit
bind = $mainMod SHIFT, E, exec, hyprctl dispatch layoutmsg togglesplit
bind = $mainMod CTRL, E, exec, hyprctl dispatch layoutmsg togglesplit
bind = $mainMod, T, exec, hyprctl dispatch layoutmsg togglesplit

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Workspaces (1-5 handled by smart-launch, 6+ direct)
bind = $mainMod, 6, exec, smart-launch chess-com "env MOZ_APP_REMOTINGNAME=chess-com firefox -P chess --new-instance --url https://www.chess.com"
bind = $mainMod, 7, workspace, 8
bind = $mainMod, 8, workspace, 9
bind = $mainMod, 9, workspace, 10
bind = $mainMod, 0, workspace, 11

bind = $mainMod SHIFT, 1, movetoworkspace, 2
# SHIFT+2 reserved for nemo launcher above (workspace 3 is lf's home)
# SHIFT+3 reserved for `exec, kitty` below (workspace 4 is kitty's smart-launch target)
bind = $mainMod SHIFT, 4, movetoworkspace, 5
bind = $mainMod SHIFT, 5, movetoworkspace, 6
bind = $mainMod SHIFT, 6, movetoworkspace, 10
bind = $mainMod SHIFT, 7, movetoworkspace, 8
bind = $mainMod SHIFT, 8, movetoworkspace, 9
bind = $mainMod SHIFT, 9, movetoworkspace, 10
bind = $mainMod SHIFT, 0, movetoworkspace, 11

# Media
bind  = , XF86AudioNext, exec, mpc next
bind  = , XF86AudioPlay, exec, mpc toggle
bind  = , XF86AudioPrev, exec, mpc prev
bind  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && pkill -RTMIN+10 waybar
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 4%+ && pkill -RTMIN+10 waybar
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 4%- && pkill -RTMIN+10 waybar

# Utilities
bind = , Print, exec, capture shot-full
bind = ALT, Print, exec, screencap shot-window
bind = $mainMod, Print, exec, capture toggle
bind = $mainMod SHIFT, Print, exec, capture panic
bind = $mainMod, Home, exec, hyprlock
bind = $mainMod, G, exec, setbg
bind = $mainMod ALT, C, exec, cycle-audio-output
bind = $mainMod CTRL SHIFT, 1, exec, window-to-corner top-left
bind = $mainMod CTRL SHIFT, 2, exec, window-to-corner top-right
bind = $mainMod CTRL SHIFT, 3, exec, window-to-corner bottom-left
bind = $mainMod CTRL SHIFT, 4, exec, window-to-corner bottom-right

bind = $mainMod, grave, workspace, e+1
bind = $mainMod, S, pin
bind = $mainMod, C, exec, scratchpad
bind = $mainMod SHIFT, C, exec, scratchpad-summon
bind = $mainMod, BackSpace, exec, sleep 0.6 && hyprctl dispatch dpms off
bind = $mainMod, Pause, exec, powermenu toggle
bind = $mainMod SHIFT, Pause, exec, powermenu panic
bind = CTRL $mainMod, Pause, exec, notify-send 'Power off in 15 seconds' && sleep 15 && systemctl poweroff
binde = $mainMod, F1, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 4%- && pkill -RTMIN+10 waybar
binde = $mainMod, F2, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 4%+ && pkill -RTMIN+10 waybar

binde = $mainMod CTRL, H, resizeactive, -30 0
binde = $mainMod CTRL, J, resizeactive, 0 30
binde = $mainMod CTRL, K, resizeactive, 0 -30
binde = $mainMod CTRL, L, resizeactive, 30 0

bind = $mainMod SHIFT, A, workspace, e-1
bind = $mainMod SHIFT, S, workspace, e+1
bind = $mainMod ALT SHIFT, A, movetoworkspace, e-1
bind = $mainMod ALT SHIFT, S, movetoworkspace, e+1

bind = $mainMod, W, exec, smart-launch ncmpcpp "kitty --class ncmpcpp -o close_on_child_death=yes -e ncmpcpp"
bind = $mainMod ALT, W, exec, kitty --class ncmpcpp-float -o close_on_child_death=yes -e ncmpcpp
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod, I, exec, smart-launch irssi "kitty --class irssi -e irssi"
bind = $mainMod ALT, P, exec, killall -SIGUSR1 waybar
bind = $mainMod ALT SHIFT, P, exec, killall -SIGUSR1 waybar
bind = $mainMod, End, exec, killall -SIGUSR1 waybar
bind = $mainMod SHIFT, 3, exec, kitty
bind = $mainMod ALT, 3, exec, kitty --class tmux-float -o font_size=10
bind = $mainMod, A, exec, rofi-db-picker
bind = $mainMod CTRL, P, exec, scrcpy
bind = CTRL $mainMod, F, exec, hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 1920 1080 && hyprctl dispatch centerwindow

bind = $mainMod, M, exec, makoctl dismiss
bind = $mainMod SHIFT, N, exec, makoctl restore
bind = $mainMod SHIFT, M, exec, makoctl dismiss --all
bind = $mainMod SHIFT, I, exec, makoctl invoke

bind = $mainMod CTRL, Scroll_Lock, exec, flameshot gui -d 3000
bind = CTRL $mainMod, Print, exec, wf-recorder -g "$(slurp)" -f /tmp/recording-$(date +%s).mp4

binde = $mainMod, minus, exec, gap-adjust all minus
binde = $mainMod, equal, exec, gap-adjust all plus
bind  = $mainMod, parenright, exec, gap-adjust all zero

# Mode-dependent gaps (bspwm parity: all = global, local = active workspace)
bind = $mainMod CTRL,  G, submap, gaps-all
bind = $mainMod SHIFT, G, submap, gaps-local

submap = gaps-all
bind = , Z,      exec, gap-adjust all zero
bind = , Z,      submap, reset
bind = , S,      exec, gap-adjust all 100
bind = , S,      submap, reset
bind = SHIFT, I, exec, gap-adjust all 40
bind = SHIFT, I, submap, reset
binde = , J,      exec, gap-adjust all minus
binde = , K,      exec, gap-adjust all plus
bind = , escape, submap, reset
bind = , return, submap, reset
submap = reset

submap = gaps-local
bind  = , Z,      exec, gap-adjust local zero
bind  = , Z,      submap, reset
bind  = , S,      exec, gap-adjust local 100
bind  = , S,      submap, reset
bind  = SHIFT, I, exec, gap-adjust local 40
bind  = SHIFT, I, submap, reset
binde = , J,      exec, gap-adjust local minus
binde = , K,      exec, gap-adjust local plus
bind  = , escape, submap, reset
bind  = , return, submap, reset
submap = reset

submap = powermenu
bind = , escape, exec, powermenu close
bind = , escape, submap, reset
bind = $mainMod, Pause, exec, powermenu close
bind = $mainMod, Pause, submap, reset
bind = , Tab, exec, powermenu focus next
bind = , ISO_Left_Tab, exec, powermenu focus prev
bind = , Right, exec, powermenu focus next
bind = , Left, exec, powermenu focus prev
bind = , Return, exec, powermenu activate
bind = , Return, submap, reset
submap = reset

submap = capture
bind = , escape, exec, capture close
bind = , escape, submap, reset
bind = $mainMod, Print, exec, capture close
bind = $mainMod, Print, submap, reset
submap = reset

binde = $mainMod ALT, K, exec, opacity-adjust 0.05
binde = $mainMod ALT, J, exec, opacity-adjust -0.05
binde = CTRL $mainMod, space, exec, opacity-adjust -0.05
binde = CTRL $mainMod ALT, space, exec, opacity-adjust 0.05
binde = $mainMod CTRL, bracketleft, exec, blur-adjust -1
binde = $mainMod CTRL, bracketright, exec, blur-adjust +1
bind  = $mainMod CTRL, backslash, exec, blur-adjust toggle

bind = $mainMod ALT, G, exec, rofi-wallpaper-picker

bindm = ALT, mouse:272, movewindow
bindm = ALT, mouse:273, resizewindow

bind = , mouse:276, exec, hid-wrapper --on
bind = , mouse:275, exec, hid-wrapper --off
bind = $mainMod, mouse:276, exec, light toggle
bind = $mainMod, mouse:275, exec, bash -c 'light $(printf "High\nLow\nColor\nRainbow" | rofi -dmenu -p "Light temperature:")'

