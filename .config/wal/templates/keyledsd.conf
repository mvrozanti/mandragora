plugins: [lua]
groups:
    special: [game, light]
    functions: [F1, F2, F3, F4, F5, F6, F7, F8, F9, F10, F11, F12]
    functions-extra: [sysrq, scrolllock, pause]
    alpha: [a, b, c, d, e, f, g, h, i, j, k, l, m,
            n, o, p, q, r, s, t, u, v, w, x, y, z]
    modifiers: [lctrl, rctrl, lshift, rshift, lmeta, lalt, ralt, capslock, fn, compose]
    arrows: [left, right, up, down]

effects:
    keyleds-default:
        plugins:
            - effect: wave
              period: 2000
              length: 1000
              direction: 60
              colors: ["{color1}", "{color2}", "{color3}", "{color4}", "{color5}", "{color6}", "{color7}", "{color8}", "{color9}", "{color10}", "{color11}", "{color12}", "{color13}"]

    rainbow:
        plugins:
            - effect: wave
              period: 2000
              length: 1000
              direction: 60
              colors: ["{color1}", "{color2}", "{color3}", "{color4}", "{color5}", "{color6}", "{color7}", "{color8}", "{color9}", "{color10}", "{color11}", "{color12}", "{color13}"]

    green-breathe:
        groups:
            special: [enter, backspace, tab]
            wipe: [esc, insert, delete, home, end, pageup, pagedown]
        plugins:
            - effect: fill
              color: 004000
              special: 002000
            - effect: breathe
              color: green
              period: 5000
            - effect: fill
              arrows: black
              functions: black
              functions-extra: black
              wipe: black
              modifiers: 006060

    standby:
        plugins:
            - effect: fill
              color: black
            - effect: breathe
              color: gray
              period: 10000
              group: special

    text-colors:
        groups:
            escape: [esc]
        plugins:
            - effect: fill
              color: 404060
              escape: orange
              arrows: green
              functions: yellow
              modifiers: darkblue

    alert:
        groups:
            alert-keys: [esc, logo, game, light]
        plugins:
            - effect: breathe
              color: red
              period: 4000
              group: alert-keys

    idle-dim:
        plugins:
            - effect: idle-dim
              color: 000000a0
              delay: 60
              fadein: 300
              fadeout: 5000

    feedback:
        plugins:
            - effect: reactive-hlines
              color: "{color2}"
              speed: 0.025

    stars-night:
        plugins:
            - effect: fill
              color: darkblue
            - effect: stars
              number: 30
              duration: 3000
              colors: [white, yellow, beige]

profiles:
    __default__:
        effect: keyleds-default
    empty:
        lookup: { class: ^$ }
        effect: rainbow
