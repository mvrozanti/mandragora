[mvrozanti@hotmail.com]
source                = notmuch://~/.local/share/mail
maildir-store         = ~/.local/share/mail
maildir-account-path  = mvrozanti@hotmail.com
multi-file-strategy   = act-all
exclude-tags          = deleted,spam
query-map             = ~/.config/aerc/notmuch-query-map
outgoing              = msmtp -a mvrozanti@hotmail.com
check-mail-cmd        = sh -c 'systemctl --user start --wait mbsync-hotmail.service && notmuch new --quiet'
check-mail-timeout    = 5m
default               = INBOX
from                  = Marcelo Vironda Rozanti <mvrozanti@hotmail.com>
copy-to               = Sent
postpone              = Drafts
folders               = INBOX,Junk,Drafts,Sent,Deleted,Archive,Governo,Investimentos,Notes,SRM,Pessoal,Compras,Sent Items,Trash,Unread,Flagged,Recent
folders-sort          = INBOX,Junk,Drafts,Sent,Deleted,Archive,Governo,Investimentos,Notes,SRM,Pessoal,Compras,Sent Items,Trash,Unread,Flagged,Recent
