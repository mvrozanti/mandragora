# ── Hyprland Configuration (0.54.3 Restored) ───────────────────

monitor = ,preferred,auto,1

env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland

input {
    kb_layout = us
    kb_variant = intl
    repeat_rate = 50
    repeat_delay = 300
    follow_mouse = 1
    touchpad {
        natural_scroll = no
    }
}

general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 3
        passes = 1
    }
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = yes
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

# ── Keybindings ──────────────────────────────────────────────

$mainMod = SUPER

# Core
bind = $mainMod, Q, killactive
bind = $mainMod, Return, exec, biggest-pane-placeholder # legacy bspc biggest.local
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, Delete, exit
bind = $mainMod, Tab, cyclenext
bind = $mainMod, Tab, bringactivetotop
bind = $mainMod, Space, togglefloating

# Apps
bind = $mainMod, 1, exec, firefox
bind = $mainMod, 2, exec, lf
bind = $mainMod SHIFT, 2, exec, nemo
bind = $mainMod, 3, exec, kitty
bind = $mainMod, 4, exec, neomutt
bind = $mainMod, 5, exec, telegram-desktop
bind = $mainMod, X, exec, discord
bind = $mainMod, V, exec, tradingview
bind = $mainMod SHIFT, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mainMod SHIFT, F, exec, zapzap
bind = $mainMod, O, exec, obsidian
bind = $mainMod SHIFT, O, exec, libreoffice

# Launchers
bind = $mainMod, R, exec, rofi -show run
bind = $mainMod SHIFT, D, exec, rofi-ide-picker
bind = $mainMod SHIFT, P, exec, rofi-tool-picker
bind = $mainMod CTRL, D, exec, rofi-db-picker

# Window Management
bind = $mainMod, E, exec, hyprctl dispatch splitratio 0.1 # placeholder for rotation
bind = $mainMod SHIFT, E, exec, hyprctl dispatch splitratio -0.1

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 10, movetoworkspace, 10

# Media
bind = , XF86AudioNext, exec, mpc next
bind = , XF86AudioPlay, exec, mpc toggle
bind = , XF86AudioPrev, exec, mpc prev
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86AudioRaiseVolume, exec, amixer -D pulse sset Master 4%+
bind = , XF86AudioLowerVolume, exec, amixer -D pulse sset Master 4%-

# Utilities
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim - | wl-copy
bind = $mainMod, Home, exec, hyprlock
bind = $mainMod, G, exec, setbg

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

