# ── Floating & Specific Rules ──────────────────────────────

windowrule {
    name = mpv-float
    match:class = mpv
    float = on
}

windowrule {
    name = galculator-float
    match:class = galculator
    float = on
}

windowrule {
    name = zenity-float
    match:class = zenity
    float = on
    pin = on
}

windowrule {
    name = kmag-float
    match:class = kmag
    float = on
    pin = on
    size = 400 300
}

windowrule {
    name = matplotlib-float
    match:class = matplotlib
    float = on
