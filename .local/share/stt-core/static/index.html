<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>stt · mvr.ac</title>
<style>
:root {
  --bg: #050805; --panel: #0a0e0a; --fg: #b8ffc4; --accent: #00ff66;
  --dim: #4a6a4e; --line: #1a2418; --bad: #ff6b6b; --warn: #ffb347;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--fg);
  font-family: "Iosevka", "JetBrains Mono", "Fira Code", ui-monospace, monospace;
  min-height: 100vh; }
body { padding: 2rem 1.5rem; }
.wrap { max-width: 900px; margin: 0 auto; }
header { display: flex; justify-content: space-between; align-items: baseline;
  border-bottom: 1px solid var(--line); padding-bottom: 0.9rem; margin-bottom: 1.6rem; }
h1 { font-size: 1.1rem; font-weight: 600; color: var(--accent); }
.who { color: var(--dim); font-size: 0.85rem; }
.panel { background: var(--panel); border: 1px solid var(--line); padding: 1.2rem; margin-bottom: 1rem; }
label { display: block; color: var(--dim); font-size: 0.85rem; margin-bottom: 0.4rem; }
input[type=file], select, button, textarea {
  background: var(--bg); color: var(--fg); border: 1px solid var(--line);
  font-family: inherit; font-size: 0.95rem; padding: 0.6rem 0.8rem; width: 100%; }
textarea { min-height: 12rem; resize: vertical; }
.row { display: flex; gap: 0.8rem; margin-top: 0.8rem; flex-wrap: wrap; align-items: flex-end; }
.row > div { flex: 1; min-width: 160px; }
button { background: var(--accent); color: var(--bg); border: none; cursor: pointer;
  font-weight: 600; padding: 0.7rem 1.2rem; width: auto; }
button:disabled { background: var(--dim); cursor: not-allowed; }
button.rec { background: var(--bad); color: #fff; }
button.rec.armed { background: var(--warn); }
.status { color: var(--dim); font-size: 0.85rem; margin-top: 0.6rem; min-height: 1.2em; }
.meta { color: var(--dim); font-size: 0.78rem; margin-top: 0.4rem; }
footer { color: var(--dim); font-size: 0.8rem; margin-top: 2rem;
  border-top: 1px solid var(--line); padding-top: 0.8rem; }
a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>stt · mvr.ac</h1>
    <span class="who" id="who"></span>
  </header>

  <div class="panel">
    <div class="row">
      <div>
        <label for="file">audio file</label>
        <input type="file" id="file" accept="audio/*,video/*">
      </div>
      <div style="flex: 0 0 auto;">
        <button id="rec" class="rec" type="button">record</button>
      </div>
    </div>
    <div class="row">
      <div>
        <label for="lang">language</label>
        <select id="lang">
          <option value="">auto-detect</option>
          <option value="en">en</option>
          <option value="pt">pt</option>
        </select>
      </div>
      <div>
        <label for="task">task</label>
        <select id="task">
          <option value="transcribe">transcribe</option>
          <option value="translate">translate → en</option>
        </select>
      </div>
      <div style="flex: 0 0 auto;">
        <button id="go">transcribe</button>
      </div>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div class="panel">
    <label for="out">transcript</label>
    <textarea id="out" readonly placeholder="transcript appears here"></textarea>
    <div class="meta" id="meta"></div>
  </div>

  <footer>
    <a href="https://mvr.ac">mvr.ac</a> · faster-whisper large-v3 · authelia-gated · gpu-coordinated
  </footer>
</div>

<script>
const $ = id => document.getElementById(id);

fetch('/whoami', { credentials: 'same-origin' })
  .then(r => r.ok ? r.text() : null)
  .then(n => { if (n) $('who').textContent = n.trim(); })
  .catch(() => {});

let recState = { mediaRecorder: null, chunks: [], blob: null };

$('rec').addEventListener('click', async () => {
  const btn = $('rec');
  if (recState.mediaRecorder && recState.mediaRecorder.state === 'recording') {
    recState.mediaRecorder.stop();
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mr = new MediaRecorder(stream);
    recState.mediaRecorder = mr;
    recState.chunks = [];
    mr.ondataavailable = e => recState.chunks.push(e.data);
    mr.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      recState.blob = new Blob(recState.chunks, { type: mr.mimeType || 'audio/webm' });
      btn.classList.remove('armed');
      btn.textContent = 'record';
      $('status').textContent = `recorded ${(recState.blob.size / 1024).toFixed(1)} KB · click transcribe`;
    };
    mr.start();
    btn.classList.add('armed');
    btn.textContent = 'stop';
    $('status').textContent = 'recording…';
  } catch (e) {
    $('status').textContent = `mic error: ${e.message}`;
  }
});

$('go').addEventListener('click', async () => {
  const fileEl = $('file');
  const blob = recState.blob || (fileEl.files[0] || null);
  if (!blob) { $('status').textContent = 'pick a file or record first'; return; }
  $('go').disabled = true;
  $('status').textContent = 'transcribing…';
  $('out').value = '';
  $('meta').textContent = '';
  const form = new FormData();
  const filename = blob.name || 'recording.webm';
  form.append('audio', blob, filename);
  if ($('lang').value) form.append('language', $('lang').value);
  form.append('task', $('task').value);
  try {
    const res = await fetch('/transcribe', { method: 'POST', body: form, credentials: 'same-origin' });
    if (!res.ok) {
      const detail = await res.text();
      throw new Error(`HTTP ${res.status}: ${detail.slice(0, 200)}`);
    }
    const data = await res.json();
    $('out').value = data.text || '(no speech detected)';
    $('meta').textContent =
      `lang=${data.language} (${(data.language_probability * 100).toFixed(0)}%) · ` +
      `audio ${data.duration.toFixed(1)}s in ${data.elapsed_seconds.toFixed(1)}s · ` +
      `rtf ${data.rtf.toFixed(2)}x · ${(data.bytes / 1024).toFixed(1)} KB`;
    $('status').textContent = 'done';
  } catch (e) {
    $('status').textContent = `error: ${e.message}`;
  } finally {
    $('go').disabled = false;
  }
});
</script>
</body>
</html>
