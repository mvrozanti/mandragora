services:

  nb-surrealdb:
    image: ${NB_SURREALDB_IMAGE:-surrealdb/surrealdb:v2}
    container_name: nb-surrealdb
    restart: unless-stopped
    user: root
    command: start --log info --user root --pass ${NB_SURREAL_PASSWORD:?required} rocksdb:/mydata/mydatabase.db
    environment:
      - SURREAL_EXPERIMENTAL_GRAPHQL=true
    volumes:
      - ${NB_SURREAL_VOLUME:-./surreal_data}:/mydata
    networks:
      - nb-net

  nb:
    image: ${NB_IMAGE:-lfnovo/open_notebook:v1-latest}
    container_name: nb
    restart: unless-stopped
    depends_on:
      - nb-surrealdb
    environment:
      - OPEN_NOTEBOOK_ENCRYPTION_KEY=${NB_ENCRYPTION_KEY:?required}
      - API_URL=https://nb.${MVR_AC:-mvr.ac}/api
      - NEXT_PUBLIC_API_URL=https://nb.${MVR_AC:-mvr.ac}/api
      - SURREAL_URL=ws://nb-surrealdb:8000/rpc
      - SURREAL_USER=root
      - SURREAL_PASSWORD=${NB_SURREAL_PASSWORD:?required}
      - SURREAL_NAMESPACE=open_notebook
      - SURREAL_DATABASE=open_notebook
    volumes:
      - ${NB_DATA_VOLUME:-./notebook_data}:/app/data
    networks:
      - nb-net
      - seafile-net
    labels:
      caddy: https://nb.${MVR_AC:-mvr.ac}
      caddy.0_@api: "path /api /api/*"
      caddy.1_handle: "@api"
      caddy.1_handle.forward_auth: "authelia:9091"
      caddy.1_handle.forward_auth.uri: "/api/authz/forward-auth"
      caddy.1_handle.forward_auth.copy_headers: "Remote-User Remote-Groups Remote-Name Remote-Email"
      caddy.1_handle.reverse_proxy: "{{upstreams 5055}}"
      caddy.2_handle.forward_auth: "authelia:9091"
      caddy.2_handle.forward_auth.uri: "/api/authz/forward-auth"
      caddy.2_handle.forward_auth.copy_headers: "Remote-User Remote-Groups Remote-Name Remote-Email"
      caddy.2_handle.reverse_proxy: "{{upstreams 8502}}"

networks:
  nb-net:
    driver: bridge
  seafile-net:
    external: true
