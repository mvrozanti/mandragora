services:

  watch:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: ${WATCH_IMAGE:-mandragora/watch:local}
    container_name: watch
    restart: unless-stopped
    environment:
      - WATCH_PUBLIC_BASE=https://watch.${MVR_AC:-mvr.ac}
      - WATCH_DATA_DIR=/data
      - WATCH_POLL_INTERVAL=${WATCH_POLL_INTERVAL:-300}
      - WATCH_MAX_EVENTS_PER_WATCHER=${WATCH_MAX_EVENTS_PER_WATCHER:-500}
      - WATCH_USER_AGENT=${WATCH_USER_AGENT:-mandragora-watch/0.1 (+https://watch.mvr.ac)}
      - WATCH_WEBHOOK_URL=${WATCH_WEBHOOK_URL:-}
      - GITHUB_PAT=${GITHUB_PAT:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID:-}
      - TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET:-}
      - WATCH_OLLAMA_URL=${WATCH_OLLAMA_URL:-http://100.115.80.79:11434}
      - WATCH_OLLAMA_MODEL=${WATCH_OLLAMA_MODEL:-qwen3:14b}
      - WATCH_OLLAMA_TIMEOUT=${WATCH_OLLAMA_TIMEOUT:-180}
      - WATCH_OLLAMA_NUM_CTX=${WATCH_OLLAMA_NUM_CTX:-16384}
      - WATCH_JUDGE_INTERVAL=${WATCH_JUDGE_INTERVAL:-30}
      - WATCH_JUDGE_BATCH=${WATCH_JUDGE_BATCH:-3}
      - WATCH_LINK_MAX_CHARS=${WATCH_LINK_MAX_CHARS:-8000}
      - WATCH_LINK_TIMEOUT=${WATCH_LINK_TIMEOUT:-20}
      - WATCH_PUSH_MAYBE=${WATCH_PUSH_MAYBE:-0}
    volumes:
      - ${WATCH_DATA_VOLUME:-./data}:/data
    networks:
      - seafile-net
    labels:
      caddy: https://watch.${MVR_AC:-mvr.ac}
      caddy.0_handle.forward_auth: "authelia:9091"
      caddy.0_handle.forward_auth.uri: "/api/authz/forward-auth"
      caddy.0_handle.forward_auth.copy_headers: "Remote-User Remote-Groups Remote-Name Remote-Email"
      caddy.0_handle.reverse_proxy: "{{upstreams 8080}}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  seafile-net:
    external: true
