services:

  gpg:
    image: ${GPG_IMAGE:-nginx:stable-alpine}
    container_name: gpg
    restart: unless-stopped
    volumes:
      - ${GPG_STATIC_VOLUME:-./static}:/usr/share/nginx/html:ro
      - ${GPG_NGINX_CONF:-./nginx.conf}:/etc/nginx/conf.d/default.conf:ro
    networks:
      - seafile-net
    labels:
      caddy_0: https://gpg.${MVR_AC:-mvr.ac}
      caddy_0.header.Strict-Transport-Security: max-age=31536000;includeSubDomains
      caddy_0.header.X-Content-Type-Options: nosniff
      caddy_0.header.X-Frame-Options: SAMEORIGIN
      caddy_0.header.Referrer-Policy: strict-origin-when-cross-origin
      caddy_0.header.Permissions-Policy: geolocation=(),microphone=(),camera=()
      caddy_0.header.-Server: ""
      caddy_0.encode: zstd gzip
      caddy_0.reverse_proxy: "{{upstreams 80}}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  seafile-net:
    external: true
