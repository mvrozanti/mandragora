server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    default_type text/plain;
    charset utf-8;

    location = / {
        try_files /pubkey.asc =404;
    }

    location = /pubkey.asc {
    }

    location = /health {
        return 200 "ok\n";
    }

    location / {
        return 404;
    }
}
