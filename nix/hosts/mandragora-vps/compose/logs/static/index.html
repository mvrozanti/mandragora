<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>log.mvr.ac</title>
<style>
:root {
  --bg: #050805;
  --panel: #0a0e0a;
  --fg: #b8ffc4;
  --accent: #00ff66;
  --dim: #4a6a4e;
  --line: #1a2418;
  --hover: #0f1810;
  --err: #ff6666;
  --warn: #ffb86c;
  --info: #88c8ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg); color: var(--fg);
  font-family: "Iosevka", "JetBrains Mono", "Fira Code", ui-monospace, monospace;
  height: 100vh; overflow: hidden;
}
body { display: flex; flex-direction: column; padding: 0.5rem; gap: 0.4rem; font-size: 0.85rem; }

header {
  display: flex; align-items: baseline; gap: 1rem;
  border-bottom: 1px solid var(--line); padding-bottom: 0.4rem;
}
header h1 { font-size: 0.95rem; font-weight: normal; color: var(--accent); letter-spacing: 0.05em; }
header h1::before { content: '$ '; opacity: 0.6; }
header .status { font-size: 0.72rem; color: var(--dim); margin-left: auto; }
header .status b { color: var(--fg); }
header a { color: var(--dim); text-decoration: none; font-size: 0.72rem; }
header a:hover { color: var(--accent); }

.row { display: flex; gap: 0.4rem; align-items: stretch; }

input.q, select, button {
  background: var(--panel); border: 1px solid var(--line); color: var(--fg);
  padding: 0.4rem 0.6rem; font: inherit; outline: none;
  border-radius: 0;
}
input.q { flex: 1; font-size: 0.85rem; }
input.q:focus, select:focus, button:focus { border-color: var(--accent); }
button { cursor: pointer; transition: border-color 0.1s, color 0.1s; }
button:hover { border-color: var(--accent); color: var(--accent); }
button.on { border-color: var(--accent); color: var(--accent); background: var(--hover); }
button.run { color: var(--accent); font-weight: bold; }

.filters {
  display: flex; flex-direction: column; gap: 0.25rem;
  max-height: 22vh; overflow-y: auto;
  background: var(--panel); border: 1px solid var(--line); padding: 0.4rem;
  font-size: 0.72rem;
}
.filters .lblrow { display: flex; gap: 0.4rem; align-items: baseline; flex-wrap: wrap; }
.filters .lblname { color: var(--dim); min-width: 7rem; text-transform: uppercase; letter-spacing: 0.05em; }
.chip {
  display: inline-block; padding: 0.05rem 0.4rem; border: 1px solid var(--line);
  cursor: pointer; user-select: none;
  background: var(--bg); color: var(--fg);
  transition: border-color 0.08s, color 0.08s;
}
.chip:hover { border-color: var(--accent); color: var(--accent); }
.chip.active { border-color: var(--accent); color: var(--accent); background: var(--hover); }
.chip.exclude { border-color: var(--err); color: var(--err); text-decoration: line-through; }

#histo {
  width: 100%; height: 60px; display: block;
  background: var(--panel); border: 1px solid var(--line);
}

.logs {
  flex: 1; overflow-y: auto; overflow-x: auto;
  background: var(--panel); border: 1px solid var(--line);
  font-size: 0.78rem; line-height: 1.4;
  padding: 0.3rem 0;
  scrollbar-color: var(--line) var(--panel);
}
.logs::-webkit-scrollbar { width: 8px; height: 8px; }
.logs::-webkit-scrollbar-track { background: var(--panel); }
.logs::-webkit-scrollbar-thumb { background: var(--line); }
.logs::-webkit-scrollbar-thumb:hover { background: var(--accent); }

.line { white-space: pre; padding: 0.05rem 0.5rem; cursor: pointer; }
.line:hover { background: var(--hover); }
.line .ts { color: var(--dim); }
.line.lvl-error, .line.lvl-err, .line.lvl-fatal, .line.lvl-crit { color: var(--err); }
.line.lvl-warn, .line.lvl-warning { color: var(--warn); }
.line.lvl-info, .line.lvl-notice { color: var(--info); }
.line.lvl-debug, .line.lvl-trace { color: var(--dim); }
.line.selected { background: var(--hover); border-left: 2px solid var(--accent); padding-left: calc(0.5rem - 2px); }

.line .meta {
  display: none; padding: 0.4rem 0.8rem; font-size: 0.72rem; color: var(--dim);
  background: var(--bg); border-top: 1px dashed var(--line); border-bottom: 1px dashed var(--line);
  margin: 0.2rem 0; white-space: pre-wrap;
}
.line.expanded .meta { display: block; }
.meta b { color: var(--accent); }

.empty {
  display: flex; align-items: center; justify-content: center;
  height: 100%; color: var(--dim); font-size: 0.85rem;
}

#err {
  display: none; padding: 0.4rem 0.6rem;
  background: #1a0808; color: var(--err); border: 1px solid var(--err);
  font-size: 0.78rem;
}
#err.show { display: block; }
</style>
</head>
<body>
<header>
  <h1>log<span style="color:var(--fg)">.mvr.ac</span></h1>
  <span class="status" id="status">—</span>
  <a href="https://hub.mvr.ac">hub</a>
  <a href="https://auth.mvr.ac/logout">logout</a>
</header>

<div class="row">
  <input class="q" id="q" placeholder='{host=~".+"}   or   {unit="alloy.service"} |~ "ERROR"' spellcheck="false">
  <select id="range" title="time range">
    <option value="900">15m</option>
    <option value="3600" selected>1h</option>
    <option value="21600">6h</option>
    <option value="86400">24h</option>
    <option value="259200">3d</option>
  </select>
  <select id="limit" title="row limit">
    <option value="500">500</option>
    <option value="2000" selected>2k</option>
    <option value="5000">5k</option>
    <option value="20000">20k</option>
  </select>
  <button class="run" id="run">run</button>
  <button id="tail" title="websocket tail">tail</button>
</div>

<div id="err"></div>

<div class="filters" id="filters">
  <div class="lblrow"><span class="lblname">loading…</span></div>
</div>

<canvas id="histo"></canvas>

<div class="logs" id="logs">
  <div class="empty">enter a query and hit run</div>
</div>

<script>
const API = '/api/loki';
const $ = (id) => document.getElementById(id);
const status_ = $('status'), errBox = $('err');
const qIn = $('q'), rangeSel = $('range'), limitSel = $('limit');
const runBtn = $('run'), tailBtn = $('tail'), logsBox = $('logs');
const filtersBox = $('filters'), histoCanvas = $('histo');

const TAB_LABELS = ['host', 'unit', 'container', 'compose_project', 'job', 'priority'];
let labelValues = {};
let selected = {};      // {label: {value: '+'|'-'}}
let tailWS = null;
let activeReq = null;

function showErr(m) { errBox.textContent = m; errBox.classList.add('show'); }
function clearErr() { errBox.classList.remove('show'); errBox.textContent = ''; }
function setStatus(s) { status_.innerHTML = s; }

function nsNow() { return BigInt(Date.now()) * 1000000n; }
function nsAgo(seconds) { return nsNow() - BigInt(seconds) * 1000000000n; }

async function lokiFetch(path, params) {
  const url = new URL(API + path, location.origin);
  if (params) for (const [k, v] of Object.entries(params)) url.searchParams.set(k, v);
  const r = await fetch(url, { credentials: 'same-origin' });
  if (!r.ok) throw new Error(`${r.status} ${await r.text().catch(()=>'')}`);
  return r.json();
}

async function loadLabels() {
  filtersBox.innerHTML = '';
  for (const lbl of TAB_LABELS) {
    const row = document.createElement('div'); row.className = 'lblrow';
    const name = document.createElement('span'); name.className = 'lblname'; name.textContent = lbl;
    row.appendChild(name);
    try {
      const res = await lokiFetch(`/label/${encodeURIComponent(lbl)}/values`);
      const vals = res.data || [];
      labelValues[lbl] = vals;
      for (const v of vals.sort()) {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.textContent = v;
        chip.dataset.lbl = lbl;
        chip.dataset.val = v;
        chip.addEventListener('click', (e) => toggleFilter(lbl, v, e.shiftKey));
        row.appendChild(chip);
      }
    } catch (e) {
      const note = document.createElement('span');
      note.className = 'chip'; note.style.borderColor = 'var(--err)';
      note.textContent = '(' + e.message + ')';
      row.appendChild(note);
    }
    filtersBox.appendChild(row);
  }
  renderChipState();
}

function toggleFilter(lbl, val, exclude) {
  if (!selected[lbl]) selected[lbl] = {};
  const cur = selected[lbl][val];
  const wanted = exclude ? '-' : '+';
  if (cur === wanted) delete selected[lbl][val];
  else selected[lbl][val] = wanted;
  if (Object.keys(selected[lbl]).length === 0) delete selected[lbl];
  renderChipState();
  buildQueryFromChips();
  run();
}

function renderChipState() {
  for (const chip of filtersBox.querySelectorAll('.chip')) {
    const lbl = chip.dataset.lbl, val = chip.dataset.val;
    if (!lbl) continue;
    chip.classList.remove('active', 'exclude');
    const s = selected[lbl] && selected[lbl][val];
    if (s === '+') chip.classList.add('active');
    else if (s === '-') chip.classList.add('exclude');
  }
}

function buildQueryFromChips() {
  const parts = [];
  for (const [lbl, vals] of Object.entries(selected)) {
    const incl = [], excl = [];
    for (const [v, sign] of Object.entries(vals)) (sign === '+' ? incl : excl).push(v);
    if (incl.length === 1) parts.push(`${lbl}="${incl[0]}"`);
    else if (incl.length > 1) parts.push(`${lbl}=~"${incl.map(esc).join('|')}"`);
    if (excl.length === 1) parts.push(`${lbl}!="${excl[0]}"`);
    else if (excl.length > 1) parts.push(`${lbl}!~"${excl.map(esc).join('|')}"`);
  }
  let sel = parts.length ? `{${parts.join(',')}}` : '{host=~".+"}';
  // preserve any pipeline suffix in the current input
  const cur = qIn.value.trim();
  const pipeIdx = cur.indexOf('|');
  if (pipeIdx > -1) sel += ' ' + cur.slice(pipeIdx);
  qIn.value = sel;
}

function esc(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function detectLevel(line) {
  const m = line.match(/\b(ERROR|ERR|FATAL|CRIT|WARN(?:ING)?|INFO|NOTICE|DEBUG|TRACE)\b/);
  return m ? m[1].toLowerCase() : null;
}

function fmtTs(nsStr) {
  const ms = Number(BigInt(nsStr) / 1000000n);
  const d = new Date(ms);
  const pad = (n,w=2) => String(n).padStart(w,'0');
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}.${pad(d.getMilliseconds(),3)}`;
}

function renderLogs(streams) {
  logsBox.innerHTML = '';
  const entries = [];
  for (const s of streams) for (const v of s.values) entries.push({ts: v[0], line: v[1], labels: s.stream});
  entries.sort((a,b) => b.ts.localeCompare(a.ts));
  if (entries.length === 0) {
    logsBox.innerHTML = '<div class="empty">no logs in range</div>';
    return;
  }
  for (const e of entries) appendLine(e, false);
  setStatus(`<b>${entries.length}</b> entries`);
}

function appendLine(e, prepend) {
  const div = document.createElement('div');
  div.className = 'line';
  const lvl = detectLevel(e.line);
  if (lvl) div.classList.add('lvl-' + lvl);
  const ts = document.createElement('span'); ts.className = 'ts'; ts.textContent = fmtTs(e.ts) + ' ';
  div.appendChild(ts);
  div.appendChild(document.createTextNode(e.line));
  const meta = document.createElement('div'); meta.className = 'meta';
  meta.innerHTML = Object.entries(e.labels).map(([k,v])=>`<b>${k}</b>=${escapeHtml(v)}`).join('  ');
  div.appendChild(meta);
  div.addEventListener('click', () => div.classList.toggle('expanded'));
  if (prepend) logsBox.insertBefore(div, logsBox.firstChild);
  else logsBox.appendChild(div);
}

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }

async function run() {
  if (tailWS) stopTail();
  clearErr();
  const q = qIn.value.trim() || '{host=~".+"}';
  const seconds = Number(rangeSel.value);
  const limit = Number(limitSel.value);
  const end = nsNow().toString();
  const start = nsAgo(seconds).toString();
  setStatus('querying…');
  if (activeReq) activeReq.abort();
  activeReq = new AbortController();
  try {
    const [logsRes, histRes] = await Promise.all([
      fetch(API + '/query_range?' + new URLSearchParams({query: q, start, end, limit, direction:'backward'}), { credentials:'same-origin', signal: activeReq.signal }).then(r => r.ok ? r.json() : r.text().then(t=>{throw new Error(r.status+' '+t)})),
      fetch(API + '/query_range?' + new URLSearchParams({query: `sum(count_over_time((${q})[${bucketFor(seconds)}]))`, start, end, step: bucketFor(seconds)}), { credentials:'same-origin', signal: activeReq.signal }).then(r => r.ok ? r.json() : null).catch(()=>null),
    ]);
    renderLogs(logsRes.data.result || []);
    drawHistogram(histRes && histRes.data && histRes.data.result || []);
  } catch (e) {
    if (e.name !== 'AbortError') { showErr(e.message); setStatus(''); }
  }
}

function bucketFor(seconds) {
  // ~60 buckets across the range
  const sec = Math.max(1, Math.round(seconds / 60));
  if (sec < 60) return sec + 's';
  if (sec < 3600) return Math.round(sec/60) + 'm';
  return Math.round(sec/3600) + 'h';
}

function drawHistogram(series) {
  const w = histoCanvas.clientWidth, h = histoCanvas.clientHeight;
  histoCanvas.width = w * devicePixelRatio; histoCanvas.height = h * devicePixelRatio;
  const ctx = histoCanvas.getContext('2d'); ctx.scale(devicePixelRatio, devicePixelRatio);
  ctx.clearRect(0,0,w,h);
  if (!series.length) return;
  const allPoints = series.flatMap(s => s.values.map(v => [Number(v[0]), Number(v[1])]));
  if (!allPoints.length) return;
  const xs = allPoints.map(p=>p[0]);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const maxY = Math.max(...allPoints.map(p=>p[1]), 1);
  const range = maxX - minX || 1;
  ctx.fillStyle = '#00ff66';
  const barW = Math.max(1, w / allPoints.length - 1);
  for (const [t, v] of allPoints) {
    const x = ((t - minX) / range) * (w - barW);
    const barH = (v / maxY) * (h - 4);
    ctx.fillRect(x, h - barH - 2, barW, barH);
  }
  ctx.fillStyle = '#4a6a4e'; ctx.font = '10px Iosevka, monospace';
  ctx.fillText(`max ${maxY}`, 4, 12);
}

function startTail() {
  const q = qIn.value.trim() || '{host=~".+"}';
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${proto}//${location.host}${API}/tail?` + new URLSearchParams({query: q, start: nsAgo(60).toString()});
  tailWS = new WebSocket(url);
  tailBtn.classList.add('on'); tailBtn.textContent = 'tail●';
  setStatus('tailing…');
  tailWS.onmessage = (msg) => {
    try {
      const d = JSON.parse(msg.data);
      for (const s of (d.streams || [])) for (const v of s.values) appendLine({ts:v[0], line:v[1], labels:s.stream}, true);
      while (logsBox.childElementCount > 5000) logsBox.removeChild(logsBox.lastChild);
    } catch {}
  };
  tailWS.onerror = () => showErr('tail websocket error');
  tailWS.onclose = () => { tailBtn.classList.remove('on'); tailBtn.textContent = 'tail'; tailWS = null; };
}

function stopTail() { if (tailWS) { tailWS.close(); tailWS = null; } tailBtn.classList.remove('on'); tailBtn.textContent = 'tail'; setStatus(''); }

runBtn.addEventListener('click', run);
qIn.addEventListener('keydown', (e) => { if (e.key === 'Enter') run(); });
rangeSel.addEventListener('change', run);
limitSel.addEventListener('change', run);
tailBtn.addEventListener('click', () => tailWS ? stopTail() : startTail());

(async () => {
  await loadLabels();
  // default query
  if (!qIn.value) qIn.value = '{host=~".+"}';
  run();
})();
</script>
</body>
</html>
