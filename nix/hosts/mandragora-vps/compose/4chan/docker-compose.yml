services:

  fourchan:
    image: ${FOURCHAN_IMAGE:-nginx:1.27-alpine}
    container_name: fourchan
    restart: unless-stopped
    volumes:
      - ${FOURCHAN_STATIC_VOLUME:-./static}:/usr/share/nginx/html:ro
    networks:
      - seafile-net
    labels:
      caddy: https://4chan.${MVR_AC:-mvr.ac}
      caddy.header.Strict-Transport-Security: max-age=31536000;includeSubDomains
      caddy.header.X-Content-Type-Options: nosniff
      caddy.header.X-Frame-Options: SAMEORIGIN
      caddy.header.Referrer-Policy: strict-origin-when-cross-origin
      caddy.header.Permissions-Policy: geolocation=(),microphone=(),camera=()
      caddy.header.-Server: ""
      caddy.encode: zstd gzip
      caddy.0_handle: "/api/*"
      caddy.0_handle.reverse_proxy: "${FOURCHAN_API_UPSTREAM:-100.115.80.79:2718}"
      caddy.1_handle.reverse_proxy: "{{upstreams 80}}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  seafile-net:
    external: true
