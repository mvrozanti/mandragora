services:

  fin:
    image: ${FIN_IMAGE:-fin-mvr-ac:latest}
    container_name: fin
    restart: unless-stopped
    environment:
      DATA_ROOT: /data
      REPO_ROOT: /src
    volumes:
      - ${FIN_DATA_DIR:-/home/opc/dnl_paper}:/data:ro
      - ${FIN_SRC_DIR:-/home/opc/fin/src}:/src:ro
    networks:
      - seafile-net
    labels:
      caddy: https://fin.${MVR_AC:-mvr.ac}
      caddy.encode: zstd gzip
      caddy.reverse_proxy: "{{upstreams 8080}}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  seafile-net:
    external: true
