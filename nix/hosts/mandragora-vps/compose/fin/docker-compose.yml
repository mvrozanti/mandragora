services:

  fin:
    image: ${FIN_IMAGE:-fin-mvr-ac:latest}
    container_name: fin
    restart: unless-stopped
    environment:
      DATA_ROOT: /data
      REPO_ROOT: /src
      AUTOPILOT_AGENT_URL: ${AUTOPILOT_AGENT_URL:-http://100.115.80.79:8765}
      AUTOPILOT_TOKEN: ${AUTOPILOT_TOKEN}
      AUTOPILOT_ALLOWED_USERS: ${AUTOPILOT_ALLOWED_USERS:-m}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${FIN_DATA_DIR:-/home/opc/dnl_paper}:/data:ro
      - ${FIN_SRC_DIR:-/home/opc/fin/src}:/src:ro
    networks:
      - seafile-net
    labels:
      caddy: https://fin.${MVR_AC:-mvr.ac}
      caddy.encode: zstd gzip
      caddy.@autopilot.path: "/autopilot* /api/autopilot/*"
      caddy.0_handle: "@autopilot"
      caddy.0_handle.0_forward_auth: "authelia:9091"
      caddy.0_handle.0_forward_auth.uri: "/api/authz/forward-auth"
      caddy.0_handle.0_forward_auth.copy_headers: "Remote-User Remote-Groups Remote-Name Remote-Email"
      caddy.0_handle.1_reverse_proxy: "{{upstreams 8080}}"
      caddy.1_handle_path: "/api/gource/*"
      caddy.1_handle_path.reverse_proxy: "gource-fin:8080"
      caddy.2_handle.0_reverse_proxy: "{{upstreams 8080}}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  gource-fin:
    image: ${GOURCE_IMAGE:-mandragora/gource-api:local}
    container_name: gource-fin
    restart: unless-stopped
    environment:
      - DESKTOP_RENDERER_URL=
      - REPO_DIR=/repo/orderbook
      - CACHE_DIR=/cache
      - RATE_LIMIT_PER_HOUR=${GOURCE_FIN_RATE_LIMIT_PER_HOUR:-10}
      - LOCAL_MAX_LENGTH_S=${GOURCE_FIN_MAX_LENGTH_S:-120}
      - LOCAL_MAX_WIDTH=${GOURCE_FIN_MAX_WIDTH:-1280}
      - LOCAL_MAX_HEIGHT=${GOURCE_FIN_MAX_HEIGHT:-1280}
      - GIT_CONFIG_COUNT=1
      - GIT_CONFIG_KEY_0=safe.directory
      - GIT_CONFIG_VALUE_0=*
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ${FIN_SRC_DIR:-/home/opc/fin/src}:/repo/orderbook:ro
      - ${GOURCE_FIN_CACHE_DIR:-./gource-cache}:/cache
    networks:
      - seafile-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  seafile-net:
    external: true
