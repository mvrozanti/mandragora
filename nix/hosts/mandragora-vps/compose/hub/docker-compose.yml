services:

  hub:
    image: ${HUB_IMAGE:-nginx:1.27-alpine}
    container_name: hub
    restart: unless-stopped
    volumes:
      - ${HUB_STATIC_VOLUME:-./static}:/usr/share/nginx/html:ro
    networks:
      - seafile-net
    labels:
      caddy_0: https://hub.${MVR_AC:-mvr.ac}
      caddy_0.0_@gpu_api: "path /api/gpu /api/gpu/*"
      caddy_0.1_handle: "@gpu_api"
      caddy_0.1_handle.forward_auth: "authelia:9091"
      caddy_0.1_handle.forward_auth.uri: "/api/authz/forward-auth"
      caddy_0.1_handle.forward_auth.copy_headers: "Remote-User Remote-Groups Remote-Name Remote-Email"
      caddy_0.1_handle.reverse_proxy: "host.docker.internal:6684"
      caddy_0.2_handle.forward_auth: "authelia:9091"
      caddy_0.2_handle.forward_auth.uri: "/api/authz/forward-auth"
      caddy_0.2_handle.forward_auth.copy_headers: "Remote-User Remote-Groups Remote-Name Remote-Email"
      caddy_0.2_handle.reverse_proxy: "{{upstreams 80}}"
      caddy_1: https://term.${MVR_AC:-mvr.ac}
      caddy_1.0_@notTailnet: not remote_ip 100.64.0.0/10
      caddy_1.1_handle: "@notTailnet"
      caddy_1.1_handle.respond: "403"
      caddy_1.2_handle.forward_auth: "authelia:9091"
      caddy_1.2_handle.forward_auth.uri: "/api/authz/forward-auth"
      caddy_1.2_handle.forward_auth.copy_headers: "Remote-User Remote-Groups Remote-Name Remote-Email"
      caddy_1.2_handle.reverse_proxy: "host.docker.internal:7681"
      caddy_1.2_handle.reverse_proxy.transport: http
      caddy_1.2_handle.reverse_proxy.transport.versions: "1.1"
      caddy_2: https://slither.${MVR_AC:-mvr.ac}
      caddy_2.0_@denied: "not path / /simulator.html /favicon.ico /static/* /exported_agents/* /api/*"
      caddy_2.1_handle: "@denied"
      caddy_2.1_handle.respond: "403"
      caddy_2.2_handle.forward_auth: "authelia:9091"
      caddy_2.2_handle.forward_auth.uri: "/api/authz/forward-auth"
      caddy_2.2_handle.forward_auth.copy_headers: "Remote-User Remote-Groups Remote-Name Remote-Email"
      caddy_2.2_handle.reverse_proxy: "host.docker.internal:8088"
      caddy_3: https://grafana.${MVR_AC:-mvr.ac}
      caddy_3.0_forward_auth: "authelia:9091"
      caddy_3.0_forward_auth.uri: "/api/authz/forward-auth"
      caddy_3.0_forward_auth.copy_headers: "Remote-User Remote-Groups Remote-Name Remote-Email"
      caddy_3.1_reverse_proxy: "host.docker.internal:3000"
      caddy_4: https://mpd.${MVR_AC:-mvr.ac}
      caddy_4.0_forward_auth: "authelia:9091"
      caddy_4.0_forward_auth.uri: "/api/authz/forward-auth"
      caddy_4.0_forward_auth.copy_headers: "Remote-User Remote-Groups Remote-Name Remote-Email"
      caddy_4.1_reverse_proxy: "host.docker.internal:6680"
      caddy_5: https://rgb.${MVR_AC:-mvr.ac}
      caddy_5.0_forward_auth: "authelia:9091"
      caddy_5.0_forward_auth.uri: "/api/authz/forward-auth"
      caddy_5.0_forward_auth.copy_headers: "Remote-User Remote-Groups Remote-Name Remote-Email"
      caddy_5.1_reverse_proxy: "host.docker.internal:6681"
      caddy_6: https://gen.${MVR_AC:-mvr.ac}
      caddy_6.0_forward_auth: "authelia:9091"
      caddy_6.0_forward_auth.uri: "/api/authz/forward-auth"
      caddy_6.0_forward_auth.copy_headers: "Remote-User Remote-Groups Remote-Name Remote-Email"
      caddy_6.1_reverse_proxy: "host.docker.internal:6682"
      caddy_7: https://llama.${MVR_AC:-mvr.ac}
      caddy_7.0_forward_auth: "authelia:9091"
      caddy_7.0_forward_auth.uri: "/api/authz/forward-auth"
      caddy_7.0_forward_auth.copy_headers: "Remote-User Remote-Groups Remote-Name Remote-Email"
      caddy_7.1_reverse_proxy: "host.docker.internal:6683"
      caddy_7.1_reverse_proxy.flush_interval: "-1"
      caddy_8: https://claude.${MVR_AC:-mvr.ac}
      caddy_8.0_@notTailnet: not remote_ip 100.64.0.0/10
      caddy_8.1_handle: "@notTailnet"
      caddy_8.1_handle.respond: "403"
      caddy_8.2_handle.forward_auth: "authelia:9091"
      caddy_8.2_handle.forward_auth.uri: "/api/authz/forward-auth"
      caddy_8.2_handle.forward_auth.copy_headers: "Remote-User Remote-Groups Remote-Name Remote-Email"
      caddy_8.2_handle.reverse_proxy: "host.docker.internal:7682"
      caddy_8.2_handle.reverse_proxy.transport: http
      caddy_8.2_handle.reverse_proxy.transport.versions: "1.1"
      caddy_9: https://log.${MVR_AC:-mvr.ac}
      caddy_9.0_@root: "path /"
      caddy_9.1_handle: "@root"
      caddy_9.1_handle.forward_auth: "authelia:9091"
      caddy_9.1_handle.forward_auth.uri: "/api/authz/forward-auth"
      caddy_9.1_handle.forward_auth.copy_headers: "Remote-User Remote-Groups Remote-Name Remote-Email"
      caddy_9.1_handle.redir: 'https://log.${MVR_AC:-mvr.ac}/explore?schemaVersion=1&panes=%7B%22a%22%3A%7B%22datasource%22%3A%22loki%22%2C%22queries%22%3A%5B%7B%22refId%22%3A%22A%22%2C%22expr%22%3A%22%7Bhost%3D~%5C%22.%2B%5C%22%7D%20%7C%20line_format%20%60%5B%7B%7Bor%20.unit%20.container%20.service_name%20%5C%22%3F%5C%22%7D%7D%5D%20%7B%7B__line__%7D%7D%60%22%2C%22queryType%22%3A%22range%22%2C%22datasource%22%3A%7B%22type%22%3A%22loki%22%2C%22uid%22%3A%22loki%22%7D%7D%5D%2C%22range%22%3A%7B%22from%22%3A%22now-1h%22%2C%22to%22%3A%22now%22%7D%7D%7D&orgId=1 302'
      caddy_9.2_handle.forward_auth: "authelia:9091"
      caddy_9.2_handle.forward_auth.uri: "/api/authz/forward-auth"
      caddy_9.2_handle.forward_auth.copy_headers: "Remote-User Remote-Groups Remote-Name Remote-Email"
      caddy_9.2_handle.reverse_proxy: "host.docker.internal:3000"
      # duckdns → mvr.ac redirect fan-out (302, path-preserving)
      caddy_20: https://${SEAFILE_SERVER_HOSTNAME:-mvrozanti.duckdns.org}
      caddy_20.redir: "https://${MVR_AC:-mvr.ac}{uri} 302"
      caddy_21: https://hub.${SEAFILE_SERVER_HOSTNAME:-mvrozanti.duckdns.org}
      caddy_21.redir: "https://hub.${MVR_AC:-mvr.ac}{uri} 302"
      caddy_22: https://gh.${SEAFILE_SERVER_HOSTNAME:-mvrozanti.duckdns.org}
      caddy_22.redir: "https://${MVR_AC:-mvr.ac}{uri} 302"
      caddy_23: https://seafile.${SEAFILE_SERVER_HOSTNAME:-mvrozanti.duckdns.org}
      caddy_23.redir: "https://seafile.${MVR_AC:-mvr.ac}{uri} 302"
      caddy_24: https://term.${SEAFILE_SERVER_HOSTNAME:-mvrozanti.duckdns.org}
      caddy_24.redir: "https://term.${MVR_AC:-mvr.ac}{uri} 302"
      caddy_25: https://slither.${SEAFILE_SERVER_HOSTNAME:-mvrozanti.duckdns.org}
      caddy_25.redir: "https://slither.${MVR_AC:-mvr.ac}{uri} 302"
      caddy_26: https://grafana.${SEAFILE_SERVER_HOSTNAME:-mvrozanti.duckdns.org}
      caddy_26.redir: "https://grafana.${MVR_AC:-mvr.ac}{uri} 302"
      caddy_27: https://paste.${SEAFILE_SERVER_HOSTNAME:-mvrozanti.duckdns.org}
      caddy_27.redir: "https://paste.${MVR_AC:-mvr.ac}{uri} 302"
      caddy_28: https://claude.${SEAFILE_SERVER_HOSTNAME:-mvrozanti.duckdns.org}
      caddy_28.redir: "https://claude.${MVR_AC:-mvr.ac}{uri} 302"
      caddy_29: https://log.${SEAFILE_SERVER_HOSTNAME:-mvrozanti.duckdns.org}
      caddy_29.redir: "https://log.${MVR_AC:-mvr.ac}{uri} 302"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  seafile-net:
    external: true
