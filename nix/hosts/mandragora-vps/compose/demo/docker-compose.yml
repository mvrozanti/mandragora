services:

  demo:
    image: ${DEMO_IMAGE:-nginx:1.27-alpine}
    container_name: demo
    restart: unless-stopped
    volumes:
      - ${DEMO_STATIC_VOLUME:-./static}:/usr/share/nginx/html:ro
    networks:
      - seafile-net
    labels:
      caddy_0: https://demo.${MVR_AC:-mvr.ac}
      caddy_0.reverse_proxy: "{{upstreams 80}}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  seafile-net:
    external: true
