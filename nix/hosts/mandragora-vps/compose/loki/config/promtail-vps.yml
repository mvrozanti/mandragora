server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.+)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'compose_project'
      - target_label: 'host'
        replacement: 'mandragora-vps'
      - target_label: 'job'
        replacement: 'docker'
    pipeline_stages:
      - template:
          source: cleaned_line
          template: '[{{ .container }}] {{ regexReplaceAll `\x1b\[[0-9;?]*[a-zA-Z]` (regexReplaceAll `\x1b\][^\x07]*\x07` .Entry ``) `` }}'
      - output:
          source: cleaned_line
      - drop:
          expression: '\] $'
          drop_counter_reason: 'empty_after_strip'
