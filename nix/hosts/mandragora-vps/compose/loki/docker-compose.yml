services:

  loki:
    image: ${LOKI_IMAGE:-grafana/loki:3.5.5}
    container_name: loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ${LOKI_CONFIG_VOLUME:-./config}:/etc/loki:ro
      - ${LOKI_DATA_VOLUME:-./data}:/loki
    ports:
      - "${TAILNET_VPS_IP:-100.84.78.83}:3100:3100"
    networks:
      - seafile-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  promtail:
    image: ${PROMTAIL_IMAGE:-grafana/promtail:3.5.5}
    container_name: loki-promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/promtail.yml"]
    depends_on:
      - loki
    volumes:
      - ${LOKI_CONFIG_VOLUME:-./config}/promtail-vps.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - seafile-net
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  size-guard:
    image: ${SIZE_GUARD_IMAGE:-alpine:3.20}
    container_name: loki-size-guard
    restart: unless-stopped
    depends_on:
      - loki
    volumes:
      - ${LOKI_DATA_VOLUME:-./data}:/loki
    environment:
      - CAP_BYTES=${LOKI_CAP_BYTES:-2147483648}
      - CHECK_INTERVAL=${LOKI_CHECK_INTERVAL:-300}
    command:
      - sh
      - -c
      - |
        while sleep "$$CHECK_INTERVAL"; do
          used=$$(du -sb /loki 2>/dev/null | awk '{print $$1}')
          [ -z "$$used" ] && continue
          if [ "$$used" -gt "$$CAP_BYTES" ]; then
            echo "[size-guard] $$used > $$CAP_BYTES, pruning oldest chunks"
            find /loki/chunks -type f -printf '%T@ %p\n' 2>/dev/null \
              | sort -n | head -n 100 | cut -d' ' -f2- | xargs -r rm -f
          fi
        done
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: "2"

networks:
  seafile-net:
    external: true
