services:

  chess:
    image: ${CHESS_IMAGE:-nginx:1.27-alpine}
    container_name: chess
    restart: unless-stopped
    volumes:
      - ${CHESS_STATIC_VOLUME:-./static}:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - seafile-net
    labels:
      caddy_0: https://chess.${MVR_AC:-mvr.ac}
      caddy_0.header.Strict-Transport-Security: max-age=31536000;includeSubDomains
      caddy_0.header.X-Content-Type-Options: nosniff
      caddy_0.header.X-Frame-Options: SAMEORIGIN
      caddy_0.header.Referrer-Policy: strict-origin-when-cross-origin
      caddy_0.header.Permissions-Policy: geolocation=(),microphone=(),camera=()
      caddy_0.header.-Server: ""
      caddy_0.encode: zstd gzip
      caddy_0.@api.path: "/api/*"
      caddy_0.0_handle: "@api"
      caddy_0.0_handle.reverse_proxy: "${CHESS_BACKEND:-100.115.80.79:8080}"
      caddy_0.1_handle.reverse_proxy: "{{upstreams 80}}"
      caddy_1: https://ccrelay.${MVR_AC:-mvr.ac}
      caddy_1.reverse_proxy: https://api.chess.com
      caddy_1.reverse_proxy.header_up: Host api.chess.com
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  seafile-net:
    external: true
