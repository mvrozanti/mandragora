services:

  music:
    image: ${MUSIC_IMAGE:-nginx:1.27-alpine}
    container_name: music
    restart: unless-stopped
    volumes:
      - ${MUSIC_STATIC_VOLUME:-./static}:/usr/share/nginx/html:ro
    networks:
      - seafile-net
    labels:
      caddy: https://music.${MVR_AC:-mvr.ac}
      caddy.encode: zstd gzip
      caddy.0_forward_auth: "authelia:9091"
      caddy.0_forward_auth.uri: "/api/authz/forward-auth"
      caddy.0_forward_auth.copy_headers: "Remote-User Remote-Groups Remote-Name Remote-Email"
      caddy.1_reverse_proxy: "{{upstreams 80}}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  seafile-net:
    external: true
