services:

  mvr-api:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: ${MVR_API_IMAGE:-mandragora/mvr-api:local}
    container_name: mvr-api
    restart: unless-stopped
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_USER=${GITHUB_USER:-mvrozanti}
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS:-3600}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://mvr.ac,https://www.mvr.ac,https://mvrozanti.github.io}
    networks:
      - seafile-net
    labels:
      caddy: https://api.${MVR_AC:-mvr.ac}
      caddy.header.Strict-Transport-Security: max-age=31536000;includeSubDomains
      caddy.header.X-Content-Type-Options: nosniff
      caddy.header.X-Frame-Options: SAMEORIGIN
      caddy.header.Referrer-Policy: strict-origin-when-cross-origin
      caddy.header.Permissions-Policy: geolocation=(),microphone=(),camera=()
      caddy.header.-Server: ""
      caddy.@docs.path: "/docs /docs/* /redoc /openapi.json"
      caddy.0_handle: "@docs"
      caddy.0_handle.respond: "404"
      caddy.1_handle.reverse_proxy: "{{upstreams 8080}}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  seafile-net:
    external: true
