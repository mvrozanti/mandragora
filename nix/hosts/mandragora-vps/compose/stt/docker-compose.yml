services:

  stt-proxy:
    image: alpine:3.20
    container_name: stt-proxy
    restart: unless-stopped
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    networks:
      - seafile-net
    labels:
      caddy: https://stt.${MVR_AC:-mvr.ac}
      caddy.0_handle.forward_auth: "authelia:9091"
      caddy.0_handle.forward_auth.uri: "/api/authz/forward-auth"
      caddy.0_handle.forward_auth.copy_headers: "Remote-User Remote-Groups Remote-Name Remote-Email"
      caddy.0_handle.request_body.max_size: "200MB"
      caddy.0_handle.reverse_proxy: "${STT_UPSTREAM:-100.115.80.79:8091}"
      caddy.0_handle.reverse_proxy.flush_interval: "-1"
      caddy.0_handle.reverse_proxy.transport: "http"

networks:
  seafile-net:
    external: true
