<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tts · mvr.ac</title>
<style>
:root {
  --bg: #050805; --panel: #0a0e0a; --fg: #b8ffc4; --accent: #00ff66;
  --dim: #4a6a4e; --line: #1a2418; --warn: #ffb347; --bad: #ff6b6b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--fg);
  font-family: "Iosevka", "JetBrains Mono", "Fira Code", ui-monospace, monospace;
  min-height: 100vh; }
body { padding: 2rem 1.5rem; }
.wrap { max-width: 900px; margin: 0 auto; }
header { display: flex; justify-content: space-between; align-items: baseline;
  border-bottom: 1px solid var(--line); padding-bottom: 0.9rem; margin-bottom: 1rem; }
h1 { font-size: 1.1rem; font-weight: 600; color: var(--accent); }
.who { color: var(--dim); font-size: 0.85rem; }
nav.tabs { display: flex; gap: 0.4rem; margin-bottom: 1.2rem; }
nav.tabs button { background: var(--panel); color: var(--dim); border: 1px solid var(--line);
  font-family: inherit; font-size: 0.85rem; padding: 0.5rem 1rem; cursor: pointer; }
nav.tabs button.active { color: var(--accent); border-color: var(--accent); }
.panel { background: var(--panel); border: 1px solid var(--line); padding: 1.2rem; margin-bottom: 1rem; }
.panel h2 { font-size: 0.9rem; color: var(--accent); font-weight: 600; margin-bottom: 0.8rem;
  letter-spacing: 0.05em; text-transform: uppercase; }
label { display: block; color: var(--dim); font-size: 0.85rem; margin-bottom: 0.4rem; }
textarea, select, button, input[type=file], input[type=text] { background: var(--bg); color: var(--fg);
  border: 1px solid var(--line); font-family: inherit; font-size: 0.95rem;
  padding: 0.6rem 0.8rem; width: 100%; }
textarea { min-height: 8rem; resize: vertical; }
.row { display: flex; gap: 0.8rem; margin-top: 0.8rem; flex-wrap: wrap; align-items: flex-end; }
.row > div { flex: 1; min-width: 200px; }
button.primary { background: var(--accent); color: var(--bg); border: none; cursor: pointer;
  font-weight: 600; padding: 0.7rem 1.2rem; width: auto; }
button.primary:disabled { background: var(--dim); cursor: not-allowed; }
button.ghost { background: transparent; color: var(--fg); border: 1px solid var(--line);
  cursor: pointer; padding: 0.5rem 1rem; width: auto; font-family: inherit; font-size: 0.85rem; }
button.danger { background: transparent; color: var(--bad); border: 1px solid var(--bad);
  cursor: pointer; padding: 0.4rem 0.8rem; width: auto; font-family: inherit; font-size: 0.78rem; }
button.rec { background: var(--bad); color: #fff; border: none; cursor: pointer;
  font-family: inherit; padding: 0.7rem 1.2rem; width: auto; }
button.rec.armed { background: var(--warn); color: var(--bg); }
audio { width: 100%; margin-top: 1rem; }
.status { color: var(--dim); font-size: 0.85rem; margin-top: 0.6rem; min-height: 1.2em; }
.meta { color: var(--dim); font-size: 0.78rem; margin-top: 0.4rem; }
.lib { display: flex; flex-direction: column; gap: 0.4rem; }
.lib-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem 0.6rem;
  border: 1px solid var(--line); background: var(--bg); }
.lib-item.selected { border-color: var(--accent); background: #0a1810; }
.lib-item .name { flex: 1; cursor: pointer; }
.lib-item .size { color: var(--dim); font-size: 0.78rem; }
.lib-empty { color: var(--dim); font-size: 0.85rem; font-style: italic; padding: 0.5rem 0; }
footer { color: var(--dim); font-size: 0.8rem; margin-top: 2rem;
  border-top: 1px solid var(--line); padding-top: 0.8rem; }
a { color: var(--accent); text-decoration: none; }
.hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>tts · mvr.ac</h1>
    <span class="who" id="who"></span>
  </header>

  <nav class="tabs">
    <button id="tab-synth" class="active">synth</button>
    <button id="tab-clone">clone</button>
  </nav>

  <section id="pane-synth">
    <div class="panel">
      <label for="text">text</label>
      <textarea id="text" placeholder="type something to synthesize"></textarea>
      <div class="row">
        <div>
          <label for="voice">voice</label>
          <select id="voice"></select>
        </div>
        <div style="flex: 0 0 auto; align-self: flex-end;">
          <button id="go" class="primary">synthesize</button>
        </div>
      </div>
      <div class="status" id="status"></div>
      <audio id="audio" controls hidden></audio>
    </div>
  </section>

  <section id="pane-clone" class="hidden">
    <div class="panel">
      <h2>voice library</h2>
      <div id="lib" class="lib"></div>
      <div class="status" id="lib-status"></div>
    </div>

    <div class="panel">
      <h2>add new voice</h2>
      <div class="row">
        <div>
          <label for="ref-name">name</label>
          <input type="text" id="ref-name" placeholder="e.g. m-default, dog-narrator" maxlength="64">
        </div>
      </div>
      <div class="row">
        <div>
          <label for="ref-file">file (8–15s, any audio/video)</label>
          <input type="file" id="ref-file" accept="audio/*,video/*">
        </div>
        <div style="flex: 0 0 auto;">
          <button id="ref-rec" class="rec" type="button">record</button>
        </div>
        <div style="flex: 0 0 auto;">
          <button id="ref-upload" class="primary">save voice</button>
        </div>
      </div>
      <div class="status" id="ref-status"></div>
    </div>

    <div class="panel">
      <h2>synthesize</h2>
      <label for="clone-text">text to speak in selected voice</label>
      <textarea id="clone-text" placeholder="up to 1000 chars"></textarea>
      <div class="row">
        <div id="clone-active" class="status">no voice selected</div>
        <div style="flex: 0 0 auto;">
          <button id="clone-go" class="primary">synthesize</button>
        </div>
      </div>
      <div class="status" id="clone-status"></div>
      <audio id="clone-audio" controls hidden></audio>
      <div class="meta" id="clone-meta"></div>
    </div>
  </section>

  <footer>
    <a href="https://mvr.ac">mvr.ac</a> · piper (synth) · f5-tts (clone) · authelia-gated
  </footer>
</div>

<script>
const $ = id => document.getElementById(id);
const LS_KEY = 'tts-clone:selected-ref';

fetch('/whoami', { credentials: 'same-origin' })
  .then(r => r.ok ? r.text() : null)
  .then(n => { if (n) $('who').textContent = n.trim(); })
  .catch(() => {});

const showPane = name => {
  for (const t of ['synth', 'clone']) {
    $(`tab-${t}`).classList.toggle('active', t === name);
    $(`pane-${t}`).classList.toggle('hidden', t !== name);
  }
  if (name === 'clone') refreshLibrary();
};
$('tab-synth').addEventListener('click', () => showPane('synth'));
$('tab-clone').addEventListener('click', () => showPane('clone'));

fetch('/voices').then(r => r.json()).then(data => {
  const sel = $('voice');
  for (const v of data.voices) {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = v;
    if (v === data.default) opt.selected = true;
    sel.appendChild(opt);
  }
});

$('go').addEventListener('click', async () => {
  const text = $('text').value.trim();
  if (!text) { $('status').textContent = 'empty input'; return; }
  $('go').disabled = true;
  $('status').textContent = 'synthesizing…';
  $('audio').hidden = true;
  try {
    const res = await fetch('/synthesize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, voice: $('voice').value }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const blob = await res.blob();
    $('audio').src = URL.createObjectURL(blob); $('audio').hidden = false;
    $('audio').play().catch(() => {});
    $('status').textContent = `${(blob.size / 1024).toFixed(1)} KB`;
  } catch (e) {
    $('status').textContent = `error: ${e.message}`;
  } finally {
    $('go').disabled = false;
  }
});

const recState = { mediaRecorder: null, chunks: [], blob: null };

$('ref-rec').addEventListener('click', async () => {
  const btn = $('ref-rec');
  if (recState.mediaRecorder && recState.mediaRecorder.state === 'recording') {
    recState.mediaRecorder.stop(); return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mr = new MediaRecorder(stream);
    recState.mediaRecorder = mr; recState.chunks = [];
    mr.ondataavailable = e => recState.chunks.push(e.data);
    mr.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      recState.blob = new Blob(recState.chunks, { type: mr.mimeType || 'audio/webm' });
      btn.classList.remove('armed'); btn.textContent = 'record';
      $('ref-status').textContent = `recorded ${(recState.blob.size / 1024).toFixed(1)} KB — name it and save`;
    };
    mr.start();
    btn.classList.add('armed'); btn.textContent = 'stop';
    $('ref-status').textContent = 'recording…';
  } catch (e) {
    $('ref-status').textContent = `mic error: ${e.message}`;
  }
});

function setActiveRef(name) {
  if (name) localStorage.setItem(LS_KEY, name);
  else localStorage.removeItem(LS_KEY);
  document.querySelectorAll('.lib-item').forEach(el => {
    el.classList.toggle('selected', el.dataset.name === name);
  });
  $('clone-active').textContent = name ? `active voice: ${name}` : 'no voice selected';
}

function getActiveRef() { return localStorage.getItem(LS_KEY) || ''; }

function fmtKB(n) { return `${(n / 1024).toFixed(1)} KB`; }
function fmtAge(mtime) {
  const s = Math.max(0, (Date.now() / 1000) - mtime);
  if (s < 60) return `${s.toFixed(0)}s ago`;
  if (s < 3600) return `${(s / 60).toFixed(0)}m ago`;
  if (s < 86400) return `${(s / 3600).toFixed(1)}h ago`;
  return `${(s / 86400).toFixed(1)}d ago`;
}

async function refreshLibrary() {
  $('lib-status').textContent = 'loading…';
  try {
    const res = await fetch('/clone/refs', { credentials: 'same-origin' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const lib = $('lib'); lib.innerHTML = '';
    if (!data.refs.length) {
      const div = document.createElement('div');
      div.className = 'lib-empty';
      div.textContent = `no saved voices for ${data.user} — add one below`;
      lib.appendChild(div);
      setActiveRef('');
      $('lib-status').textContent = '';
      return;
    }
    const active = getActiveRef();
    let activeStillExists = false;
    for (const r of data.refs) {
      const row = document.createElement('div');
      row.className = 'lib-item';
      row.dataset.name = r.name;
      if (r.name === active) { row.classList.add('selected'); activeStillExists = true; }
      const nm = document.createElement('div');
      nm.className = 'name'; nm.textContent = r.name;
      nm.addEventListener('click', () => setActiveRef(r.name));
      const sz = document.createElement('div');
      sz.className = 'size'; sz.textContent = `${fmtKB(r.size_bytes)} · ${fmtAge(r.mtime)}`;
      const play = document.createElement('button');
      play.className = 'ghost'; play.textContent = 'play';
      play.addEventListener('click', async () => {
        const a = new Audio(`/clone/refs/${encodeURIComponent(r.name)}`);
        a.play().catch(e => $('lib-status').textContent = `play error: ${e.message}`);
      });
      const del = document.createElement('button');
      del.className = 'danger'; del.textContent = 'delete';
      del.addEventListener('click', async () => {
        if (!confirm(`delete voice "${r.name}"?`)) return;
        const dr = await fetch(`/clone/refs/${encodeURIComponent(r.name)}`, {
          method: 'DELETE', credentials: 'same-origin',
        });
        if (!dr.ok) { $('lib-status').textContent = `delete failed: HTTP ${dr.status}`; return; }
        if (r.name === getActiveRef()) setActiveRef('');
        await refreshLibrary();
      });
      row.appendChild(nm); row.appendChild(sz); row.appendChild(play); row.appendChild(del);
      lib.appendChild(row);
    }
    if (!activeStillExists && active) setActiveRef('');
    else setActiveRef(active);
    $('lib-status').textContent = `${data.refs.length} saved`;
  } catch (e) {
    $('lib-status').textContent = `error: ${e.message}`;
  }
}

$('ref-upload').addEventListener('click', async () => {
  const name = $('ref-name').value.trim();
  if (!name) { $('ref-status').textContent = 'give the voice a name first'; return; }
  const fileEl = $('ref-file');
  const blob = recState.blob || (fileEl.files[0] || null);
  if (!blob) { $('ref-status').textContent = 'pick a file or record first'; return; }
  $('ref-upload').disabled = true;
  $('ref-status').textContent = 'uploading…';
  const form = new FormData();
  form.append('name', name);
  form.append('audio', blob, blob.name || 'reference.webm');
  try {
    const res = await fetch('/clone/refs', { method: 'POST', body: form, credentials: 'same-origin' });
    if (!res.ok) {
      const detail = await res.text();
      throw new Error(`HTTP ${res.status}: ${detail.slice(0, 200)}`);
    }
    const data = await res.json();
    let msg = `saved "${data.name}" (${data.duration_seconds.toFixed(1)}s)`;
    if (data.warning) msg += ` · ${data.warning}`;
    $('ref-status').textContent = msg;
    recState.blob = null; fileEl.value = ''; $('ref-name').value = '';
    setActiveRef(data.name);
    await refreshLibrary();
  } catch (e) {
    $('ref-status').textContent = `upload error: ${e.message}`;
  } finally {
    $('ref-upload').disabled = false;
  }
});

$('clone-go').addEventListener('click', async () => {
  const text = $('clone-text').value.trim();
  if (!text) { $('clone-status').textContent = 'empty input'; return; }
  const refName = getActiveRef();
  if (!refName) { $('clone-status').textContent = 'select a voice from the library first'; return; }
  $('clone-go').disabled = true;
  $('clone-status').textContent = 'synthesizing… (first call loads the model, may take ~30s)';
  $('clone-audio').hidden = true; $('clone-meta').textContent = '';
  const form = new FormData();
  form.append('text', text);
  form.append('ref_name', refName);
  try {
    const res = await fetch('/clone/synthesize', { method: 'POST', body: form, credentials: 'same-origin' });
    if (!res.ok) {
      const detail = await res.text();
      throw new Error(`HTTP ${res.status}: ${detail.slice(0, 200)}`);
    }
    const elapsed = res.headers.get('X-Elapsed-Seconds');
    const blob = await res.blob();
    $('clone-audio').src = URL.createObjectURL(blob); $('clone-audio').hidden = false;
    $('clone-audio').play().catch(() => {});
    $('clone-status').textContent = 'done';
    $('clone-meta').textContent = `voice "${refName}" · ${(blob.size / 1024).toFixed(1)} KB · ${elapsed}s on GPU`;
  } catch (e) {
    $('clone-status').textContent = `error: ${e.message}`;
  } finally {
    $('clone-go').disabled = false;
  }
});
</script>
</body>
</html>
