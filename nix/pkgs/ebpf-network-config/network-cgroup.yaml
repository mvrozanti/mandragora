metrics:
  counters:
    - name: cgroup_wan_tcp_send_bytes_total
      help: TCP bytes sent to a non-local (WAN) peer, attributed to the originating cgroup
      labels:
        - name: cgroup
          size: 8
          decoders:
            - name: uint
            - name: cgroup
    - name: cgroup_wan_tcp_recv_bytes_total
      help: TCP bytes received from a non-local (WAN) peer, attributed to the consuming cgroup
      labels:
        - name: cgroup
          size: 8
          decoders:
            - name: uint
            - name: cgroup
